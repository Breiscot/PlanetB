<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanetB 3D</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }

        #cesiumContainer {
            width: 100vw;
            height: 100vh;
        }

        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 20px;
            color: white;
            z-index: 1000;
            width: 300px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .control-panel.collapsed {
            transform: translateX(-260px);
        }

        .control-panel h2 {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-panel {
            position: absolute;
            right: -40px;
            top: 10px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-box {
            width: 100%;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            outline: none;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box:focus {
            border-color: #4fc3f7;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .btn-fly {
            background: linear-gradient(135deg, #1a73e8, #4fc3f7);
        }

        .btn-fly:hover {
            background: linear-gradient(135deg, #1557b0, #3daee0);
            transform: translateY(-1px);
        }

        .btn-view {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-view:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-view.active {
            background: rgba(79, 195, 247, 0.3);
            border-color: #4fc3f7;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            margin-top: 5px;
        }

        .places-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 15px;
        }

        .place-btn {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.5);
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            text-align: left;
        }

        .place-btn:hover {
            background: rgba(79, 195, 247, 0.2);
            border-color: rgba(79, 195, 247, 0.4);
            transform: scale(1.02);
        }

        .place-btn .emoji {
            font-size: 16px;
            display: block;
            margin-bottom: 3px;
        }

        .info-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 10px 25px;
            color: white;
            z-index: 1000;
            display: flex;
            gap: 25px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-item .label {
            color: rgba(255, 255, 255, 0.5);
        }

        .info-item .value {
            color: #4fc3f7;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .cesium-viewer-bottom {
            display: none !important;
        }

        .cesium-viewer-toolbar {
            display: none !important;
        }

        .zoom-controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1000;
        }

        .zoom-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .zoom-btn:hover {
            background: rgba(79, 195, 247, 0.3);
        }

        .zoom-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 2px 5px;
        }

        .marker-popup {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 15px 20px;
            color: white;
            z-index: 2000;
            min-height: 200px;
            border: 1px solid rgba(79, 195, 247, 0.3);
            display: none;
            pointer-events: none;
        }

        .marker-popup h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .marker-popup p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a1628 0%, #000 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-globe {
            font-size: 80px;
            animation: spin 3s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 18px;
            font-weight: 300;
        }

        .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7, #1a73e8);
            border-radius: 3px;
            animation: loading 2s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0%; margin-left: 0; }
            50% { width: 70%; margin-left: 15%; }
            100% { width: 0%; margin-left: 100%; }
        }

        @media (max-width: 768px) {
            .control-panel {
                width: 250px;
                padding: 15px;
            }
            .info-bar {
                flex-wrap: wrap;
                gap: 10px;
                font-size: 11px;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-globe">⚪</div>
        <div class="loading-text">Loading the globe...</div>
        <div class="loading-bar">
            <div class="loading-bar-fill"></div>
        </div>
    </div>

    <div id="cesiumContainer"></div>

    <!-- Control Panel -->
    <div class="control-panel" id="controlPanel">
        <button class="toggle-panel" onclick="togglePanel()">☰</button>
        <h2>Earth Exsplorer</h2>

        <!-- Search -->
        <input type="text" class="search-box" id="searchInput" placeholder="Search a place..." onkeypress="handleSearch(event)">
        
        <!-- View modes -->
        <div class="section-title">View Mode</div>
        <div class="btn-group">
            <button class="btn btn-view active" id="btn3d" onclick="setViewMode('3d')">🌐 Globe 3D</button>
            <button class="btn btn-view" id="btn2d" onclick="setViewMode('2d')">🗺️ Map 2D</button>
            <button class="btn btn-view" id="btnColumbus" onclick="setViewMode('columbus')">📐 View Columbus</button>
        </div>

        <!-- Layer options -->
        <div class="section-title">Levels</div>
        <div class="btn-group">
            <button class="btn btn-view" id="btnNight" onclick="toggleNight()">🌙 Night View</button>
            <button class="btn btn-view" id="btnAtmosphere" onclick="toggleAtmosphere()">💨 Atmosphere</button>
            <button class="btn btn-view" id="btnGrid" onclick="toggleGrid()">📏 Grid</button>
        </div>

        <div class="section-title">Type of Map</div>
        <div class="places-grid">
            <button class="place-btn map-btn active" id="btn_satellite" onclick="setImageryLayer('satellite')">
                <span class="emoji">🛰️</span> Satellite
            </button>
            <button class="place-btn map-btn" id="btn_osm" onclick="setImageryLayer('osm')">
                <span class="emoji">🗺️</span> Roads
            </button>
            <button class="place-btn map-btn" id="btn_terrain" onclick="setImageryLayer('terrain')">
                <span class="emoji">⛰️</span> Terrain
            </button>
        </div>

        <!-- Famous places -->
        <div class="section-title">Famous Places</div>
        <div class="places-grid">
            <button class="place-btn" onclick="flyTo(41.8902, 12.4922, 800, 'Colosseum, Rome')">
                <span class="emoji"></span> Colosseum
            </button>
            <button class="place-btn" onclick="flyTo(48.8584, 2.2945, 800, 'Tour Eiffel, Paris')">
                <span class="emoji"></span> Tour Eiffel
            </button>
            <button class="place-btn" onclick="flyTo(40.6892, -74.0445, 800, 'Statue of Liberty')">
                <span class="emoji"></span> New York
            </button>
            <button class="place-btn" onclick="flyTo(27.1751, 78.0421, 800, 'Taj Mahal, India')">
                <span class="emoji"></span> Taj Mahal
            </button>
            <button class="place-btn" onclick="flyTo(35.6762, 139.6503, 1500, 'Tokyo, Japan')">
                <span class="emoji"></span> Tokyo
            </button>
            <button class="place-btn" onclick="flyTo(-22.9519, -43.2105, 1000, 'Cristo Redentore')">
                <span class="emoji"></span> Rio
            </button>
            <button class="place-btn" onclick="flyTo(29.9792, 31.1342, 800, 'Pyramid Giza')">
                <span class="emoji"></span> Pyramid
            </button>
            <button class="place-btn" onclick="flyTo(-33.8568, 151.2153, 1000, 'Sydney Opera House')">
                <span class="emoji"></span> Sydney
            </button>
            <button class="place-btn" onclick="flyTo(40.4319, -3.6761, 1500, 'Madrid, Spain')">
                <span class="emoji"></span> Madrid
            </button>
            <button class="place-btn" onclick="flyTo(55.7558, 37.6173, 2000, 'Moscow, Russia')">
                <span class="emoji"></span> Moscow
            </button>
            <button class="place-btn" onclick="flyTo(-13.1631, -72.5450, 2000, 'Machu Picchu')">
                <span class="emoji"></span> Machu Picchu
            </button>
            <button class="place-btn" onclick="flyTo(51.5007, -0.1246, 800, 'Big Ben, London')">
                <span class="emoji"></span> London
            </button>
        </div>

        <!-- Actions -->
        <div class="btn-group">
            <button class="btn btn-fly" onclick="resetView()">Initial View</button>
            <button class="btn btn-fly" onclick="startAutoRotate()" style="background: linear-gradient(135deg, #6a1b9a, #ab47bc);">Auto-Rotation</button>
        </div>
    </div>

    <!-- Zoom Controls -->
     <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()" title="Zoom In">+</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" onclick="zoomOut()" title="Zoom Out">-</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" onclick="resetView()" title="Reset" style="font-size: 14px;">RESET</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" onclick="toggleFullscreen()" title="Fullscreen" style="font-size: 14px;">▨</button>
     </div>

     <!-- Info Bar -->
      <div class="info-bar" id="infoBar">
        <div class="info-item">
            <span class="label">Lat:</span>
            <span class="value" id="latValue">0.000</span>
        </div>
        <div class="info-item">
            <span class="label">Lon:</span>
            <span class="value" id="lonValue">0.000</span>
        </div>
        <div class="info-item">
            <span class="label">Location: </span>
            <span class="value" id="locationName">-</span>
        </div>
      </div>

      <script>
        
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI0YjAyNjFhYS0wNGM3LTQyODItOTBkYi01NmFiNWI4MmM2YjEiLCJpZCI6MjU5LCJpYXQiOjE3MjUwMzIwMDB9.placeholder';

        let viewer;
        let autoRotateEnabled = false;
        let autoRotateHandler = null;
        let nightMode = false;
        let gridEnabled = false;
        let gridLayer = null;
        let markers = [];
        let currentBaseLayer = 'satellite';

        // Initializing

        async function initGlobe() {
            try {
                viewer = new Cesium.Viewer('cesiumContainer', {
                    // Terrain 3D
                    terrainProvider: await Cesium.createWorldTerrainAsync({
                        requestWaterMask: true,
                        requestVertexNormals: true
                    }),

                    // Settings UI
                    animation: false,
                    baseLayerPicker: false,
                    fullscreenButton: false,
                    vrButton: false,
                    geocoder: false,
                    homeButton: false,
                    infoBox: true,
                    sceneModePicker: false,
                    selectionIndicator: true,
                    timeline: false,
                    navigationHelpButton: false,
                    navigationInstructionsInitiallyVisible: false,
                    scene3DOnly: false,

                    // SkyBox e atmosphere
                    skyBox: new Cesium.SkyBox({
                        sources: {
                            positiveX: 'https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Assets/Textures/SkyBox/tycho2t3_80_px.jpg',
                            negativeX: 'https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Assets/Textures/SkyBox/tycho2t3_80_mx.jpg',
                            positiveY: 'https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Assets/Textures/SkyBox/tycho2t3_80_py.jpg',
                            negativeY: 'https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Assets/Textures/SkyBox/tycho2t3_80_my.jpg',
                            positiveZ: 'https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Assets/Textures/SkyBox/tycho2t3_80_pz.jpg',
                            negativeZ: 'https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Assets/Textures/SkyBox/tycho2t3_80_mz.jpg'    
                        }
                    }),
                    skyAtmosphere: new Cesium.SkyAtmosphere(),
                });

                // Layer Satellitale of Default

                await setImageryLayer('satellite');

                // Config Scene
                const scene = viewer.scene;
                scene.globe.enableLighting = true;
                scene.globe.depthTestAgainstTerrain = true;
                scene.fog.enabled = true;
                scene.globe.showGroundAtmosphere = true;

                // Anti-aliasing
                if (Cesium.PostProcessStageLibrary.createFXAAStage) {
                    viewer.scene.postProcessStages.fxaa.enabled = true;
                }

                // Initial Position - View from Europe/Italy
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(12.4964, 41.9028, 15000000),
                    orientation: {
                        heading: Cesium.Math.toRadians(0),
                        pitch: Cesium.Math.toRadians(-90),
                        roll: 0
                    },
                    duration: 3
                });

                // Add markers to famous places
                addFamousPlaceMarkers();

                // Mouse tracking for coordinate
                setupMouseTracking();

                // Hide loading screen
                setTimeout(() => {
                    document.getElementById('loadingScreen').classList.add('hidden');
                }, 2500);

            } catch (error) {
                console.error('Error Cesium Ion, used layer OpenStreet', error);
                initFallbackGlobe();
            }
        }

        // Fallback without token Cesium Ion
        function initFallbackGlobe() {
            viewer = new Cesium.Viewer('cesiumContainer', {
                animation: false,
                baseLayerPicker: false,
                fullscreenButton: false,
                vrButton: false,
                geocoder: false,
                homeButton: false,
                infoBox: true,
                sceneModePicker: false,
                selectionIndicator: true,
                timeline: false,
                navigationHelpButton: false,
            });

            // Remove the layer default and add OpenStreetMap
            viewer.imageryLayers.removeAll();
            viewer.imageryLayers.addImageryProvider(
                new Cesium.OpenStreetMapImageryProvider({
                    url: 'https://tile.openstreetmap.org/'
                })
            );

            const scene = viewer.scene;
            scene.globe.enableLighting = true;
            scene.globe.showGroundAtmosphere = true;

            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(12.4964, 41.9028, 15000000),
                orientation: {
                    heading: 0,
                    pitch: Cesium.Math.toRadians(-90),
                    roll: 0
                },
                duration: 3
            });

            addFamousPlaceMarkers();
            setupMouseTracking();

            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 2500);
        }

        // Manage layer imagery (Satellite, Osm ..)

        async function setImageryLayer(type) {
            const layers = viewer.imageryLayers;

            // Remove only base layer
            if (layers.length > 0) {
                if (gridLayer) {
                    while (layers.length > 1) {
                        if (layers.get(0) !== gridLayer) {
                            layers.remove(layers.get(0));
                        } else if (layers.length > 1) {
                            layers.remove(layers.get(1));
                        }
                    }
                } else {
                    layers.removeAll();
                }
            }

            let provider;

            switch (type) {
                case 'satellite':
                    try {
                        provider = await Cesium.IonImageryProvider.fromAssetId(2);
                    } catch (e) {
                        provider = new Cesium.ArcGisMapServerImageryProvider({
                            url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
                        });
                    }
                    break;

                case 'osm':
                    provider = new Cesium.OpenStreetMapImageryProvider({
                        url: 'https://tile.openstreetmap.org/'
                    });
                    break;

                case 'terrain':
                    provider = new Cesium.UrlTemplateImageryProvider({
                        url: 'https://tiles.stadiamaps.com/tiles/stamen_terrain/{z}/{x}/{y}.png',
                        credit: 'Studia Maps / Stamen Design'
                    });
                    break;
            
                case 'dark':
                    provider = new Cesium.UrlTemplateImageryProvider({
                        url: 'https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
                        credit: 'CartoDB'
                    });
                    break;

                case 'watercolor':
                    provider = new Cesium.UrlTemplateImageryProvider({
                        url: 'https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg',
                        credit: 'Stadia Maps / Stamen Design'
                    });
                    break;

                default:
                    provider = new Cesium.OpenStreetMapImageryProvider({
                        url: 'https://tile.openstreetmap.org/'
                    });
            }

            if (gridLayer) {
                layers.addImageryProvider(provider, 0);
            } else {
                layers.addImageryProvider(provider);
            }

            currentBaseLayer = type;

            document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById('btn_' + type);
            if (activeBtn) activeBtn.classList.add('active');
        }

        // Markers in famous places

        function addFamousPlaceMarkers() {
            const places = [
                { name: 'Colosseum', lat: 41.8902, lon: 12.4922, emoji: '🏛️' },
                { name: 'Tour Eiffel', lat: 48.8584, lon: 2.2945, emoji: '🗼' },
                { name: 'Statue of Liberty', lat: 40.6892, lon: -74.0445, emoji: '🗽' },
                { name: 'Taj Mahal', lat: 27.1751, lon: 78.0421, emoji: '🕌' },
                { name: 'Tokyo Tower', lat: 35.6586, lon: 139.7454, emoji: '🗾' },
                { name: 'Cristo Redentore', lat: -22.9519, lon: -43.2105, emoji: '✝️' },
                { name: 'Pyramid Giza', lat: 29.9792, lon: 31.1342, emoji: '' },
                { name: 'Sydney Opera House ', lat: -33.8568, lon: 151.2153, emoji: '' },
                { name: 'Machu Picchu', lat: -13.1631, lon: -72.5450, emoji: '' },
                { name: 'Big Ben', lat: 51.5007, lon: -0.1246, emoji: '' },
            ];

            places.forEach(place => {
                viewer.entities.add({
                    name: place.name,
                    position: Cesium.Cartesian3.fromDegrees(place.lon, place.lat, 0),
                    point: {
                        pixelSize: 10,
                        color: Cesium.Color.fromCssColorString('#4fc3f7'),
                        outlineColor: Cesium.Color.WHITE,
                        outlineWidth: 2,
                        heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                        scaleByDistance: new Cesium.NearFarScalar(1.5e2, 2.0, 1.5e7, 0.5),
                    },
                    label: {
                        text: `${place.emoji} ${place.name}`,
                        font: '14px sans-serif',
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        outlineWidth: 2,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        pixelOffset: new Cesium.Cartesian2(0, -15),
                        heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                        scaleByDistance: new Cesium.NearFarScalar(1.5e2, 1.0, 1.5e7, 0.3),
                        translucencyByDistance: new Cesium.NearFarScalar(1.5e5, 1.0, 5.0e6, 0.0),
                    },
                    description: `
                        <div style="font-family: sans-serif; padding: 10px;">
                            <h2>${place.emoji} ${place.name}</h2>
                            <p><strong>Coordinate:</strong> ${place.lat.toFixed(4)}°, ${place.lon.toFixed(4)}°</p>
                        </div>
                    `
                });
            });
        }

        // Mouse Tracking

        function setupMouseTracking() {
            const handler = new Cesium.ScreenSpaceEventHandler(viewer.canvas);

            handler.setInputAction(function (movement) {
                const cartesian = viewer.camera.pickEllipsoid(
                    movement.endPosition,
                    viewer.scene.globe.ellipsoid
                );

                if (cartesian) {
                    const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
                    const lat = Cesium.Math.toDegrees(cartographic.latitude);
                    const lon = Cesium.Math.toDegrees(cartographic.longitude);

                    document.getElementById('latValue').textContent = lat.toFixed(3) + '°';
                    document.getElementById('lonValue').textContent = lon.toFixed(3) + '°';
                }

                const cameraHeight = viewer.camera.positionCartographic.height;
                if(cameraHeight > 1000000) {
                    document.getElementById('altValue').textContent = (cameraHeight / 1000).toFixed(0) + ' km';
                } else if (cameraHeight > 1000) {
                    document.getElementById('altValue').textContent = (cameraHeight / 1000).toFixed(1) + ' km';
                } else {
                    document.getElementById('altValue').textContent = cameraHeight.toFixed(0) + ' m';
                }
            }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);
        }

        // Navigation - flyTo

        function flyTo(lat, lon, height, name) {
            stopAutoRotate();

            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(lon, lat, height || 1000),
                orientation: {
                    heading: Cesium.Math.toRadians(0),
                    pitch: Cesium.Math.toRadians(-45),
                    roll: 0
                },
                duration: 3
            });

            if (name) {
                document.getElementById('locationName').textContent = name;
            }
        }

        function resetView() {
            stopAutoRotate();
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(12.4964, 41.9028, 15000000),
                orientation: {
                    heading: 0,
                    pitch: Cesium.Math.toRadians(-90),
                    roll: 0
                },
                duration: 2
            });
            document.getElementById('locationName').textContent = '-';
        }

        // Zoom

        function zoomIn() {
            viewer.camera.zoomIn(viewer.camera.positionCartographic.height * 0.3);
        }

        function zoomOut() {
            viewer.camera.zoomOut(viewer.camera.positionCartographic.height * 0.5);
        }

        // ViewMode

        function setViewMode(mode) {
            document.querySelectorAll('.btn-view').forEach(b => b.classList.remove('active'));

            switch (mode) {
                case '3d':
                    viewer.scene.mode = Cesium.SceneMode.SCENE3D;
                    document.getElementById('btn3d').classList.add('active');
                    break;
                case '2d':
                    viewer.scene.mode = Cesium.SceneMode.SCENE2D;
                    document.getElementById('btn2d').classList.add('active');
                    break;
                case 'columbus':
                    viewer.scene.mode = Cesium.SceneMode.COLUMBUS_VIEW;
                    document.getElementById('btnColumbus').classList.add('active');
                    break;
            }
        }

        // Toggle Features

        function toggleNight() {
            nightMode = !nightMode;
            viewer.scene.globe.enableLighting = nightMode;

            const btn = document.getElementById('btnNight');
            btn.classList.toggle('active');

            if (nightMode) {
                // Simulate night view
                viewer.clock.currentTime = Cesium.JulianDate.fromDate(new Date('2024-01-15T22:00:00Z'));
                viewer.clock.shouldAnimate = false;
            } else {
                viewer.clock.currentTime = Cesium.JulianDate.now();
            }
        }

        function toggleAtmosphere() {
            const scene = viewer.scene;
            scene.skyAtmosphere.show = !scene.skyAtmosphere.show;
            scene.globe.showGroundAtmosphere = !scene.globe.showGroundAtmosphere;
            document.getElementById('btnAtmosphere').classList.toggle('active');
        }

        function toggleGrid() {
            gridEnabled = !gridEnabled;
            document.getElementById('btnGrid').classList.toggle('active');

            if (gridEnabled) {
                const gridProvider = new Cesium.GridImageryProvider({
                    cells: 4,
                    color: Cesium.Color.fromCssColorString('rgba(255, 255, 255, 0.3)'),
                    glowColor: Cesium.Color.fromCssColorString('rgba(79, 195, 247, 0.2)'),
                    glowWidth: 2
                });
                gridLayer = viewer.imageryLayers.addImageryProvider(gridProvider);
                gridLayer.alpha = 0.6;
            } else {
                // Remove grid layer
                if (gridLayer) {
                    viewer.imageryLayers.remove(gridLayer);
                    gridLayer = null;
                }
            }
        }

        // AutoRotate

        function startAutoRotate() {
            if (autoRotateEnabled) {
                stopAutoRotate();
                return;
            }

            autoRotateEnabled = true;

            viewer.clock.onTick.addEventListener(autoRotateTick);

            // Set view from top
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(
                    Cesium.Math.toDegrees(viewer.camera.positionCartographic.longitude),
                    0,
                    20000000
                ),
                orientation: {
                    heading: 0,
                    pitch: Cesium.Math.toRadians(-90),
                    roll: 0
                },
                duration: 2
            });
        }

        function autoRotateTick(clock) {
            if (!autoRotateEnabled) return;
            viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, -0.002);
        }

        function stopAutoRotate() {
            autoRotateEnabled = false;
            viewer.clock.onTick.removeEventListener(autoRotateTick);
        }

        // Search

        async function handleSearch(event) {
            if (event.key !== 'Enter') return;

            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`
                );
                const data = await response.json();

                if (data && data.length > 0) {
                    const result = data[0];
                    const lat = parseFloat(result.lat);
                    const lon = parseFloat(result.lon);

                    flyTo(lat, lon, 5000, result.display_name.split(',')[0]);

                    // Add marker
                    viewer.entities.add({
                        name: result.display_name.split(',')[0],
                        position: Cesium.Cartesian3.fromDegrees(lon, lat),
                        billboard: {
                            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                        },
                        point: {
                            pixelSize: 12,
                            color: Cesium.Color.RED,
                            outlineColor: Cesium.Color.WHITE,
                            outlineWidth: 2,
                            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                        },
                        label: {
                            text: '- ' + result.display_name.split(',')[0],
                            font: '14px sans-serif',
                            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                            outlineWidth: 2,
                            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                            pixelOffset: new Cesium.Cartesian2(0, -20),
                            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                        },
                        description: `
                            <div style="font-family: sans-serif; padding: 10px;">
                                <h2>- ${result.display_name.split(',')[0]}</h2>
                                <p>${result.display_name}</p>
                                <p><strong>Coordinate:</strong> ${lat.toFixed(4)}°, ${lon.toFixed(4)}°</p>
                            </div>
                        `
                    });
                } else {
                    alert('Place not founded. Try with another name.');
                }
            } catch (error) {
                console.error('Error research: ', error);
                alert('Error in the research. Check your internet connection.');
            }
        }

        // UI Help

        function togglePanel() {
            document.getElementById('controlPanel').classList.toggle('collapsed');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialization

        initGlobe();

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'r': startAutoRotate(); break;
                case 'h': resetView(); break;
                case 'f': toggleFullscreen(); break;
                case 'Escape': stopAutoRotate(); break;
            }
        });
      </script>
</body>
</html>
