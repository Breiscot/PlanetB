<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanetB 3D</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }

        #threejsContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            z-index: 1;
        }

        #cesiumContainer {
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 20px;
            color: white;
            z-index: 1000;
            width: 300px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .control-panel.collapsed {
            transform: translateX(-260px);
        }

        .control-panel h2 {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-panel {
            position: absolute;
            right: -40px;
            top: 10px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-box {
            width: 100%;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            outline: none;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box:focus {
            border-color: #4fc3f7;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .btn-fly {
            background: linear-gradient(135deg, #1a73e8, #4fc3f7);
        }

        .btn-fly:hover {
            background: linear-gradient(135deg, #1557b0, #3daee0);
            transform: translateY(-1px);
        }

        .btn-view {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-view:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-view.active {
            background: rgba(79, 195, 247, 0.3);
            border-color: #4fc3f7;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            margin-top: 5px;
        }

        .places-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 15px;
        }

        .place-btn {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.5);
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            text-align: left;
        }

        .place-btn:hover {
            background: rgba(79, 195, 247, 0.2);
            border-color: rgba(79, 195, 247, 0.4);
            transform: scale(1.02);
        }

        .place-btn .emoji {
            font-size: 16px;
            display: block;
            margin-bottom: 3px;
        }

        .info-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 10px 25px;
            color: white;
            z-index: 1000;
            display: flex;
            gap: 25px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-item .label {
            color: rgba(255, 255, 255, 0.5);
        }

        .info-item .value {
            color: #4fc3f7;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .cesium-viewer-bottom {
            display: none !important;
        }

        .cesium-viewer-toolbar {
            display: none !important;
        }

        .zoom-controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1000;
        }

        .zoom-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .zoom-btn:hover {
            background: rgba(79, 195, 247, 0.3);
        }

        .zoom-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 2px 5px;
        }

        .marker-popup {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 15px 20px;
            color: white;
            z-index: 2000;
            min-height: 200px;
            border: 1px solid rgba(79, 195, 247, 0.3);
            display: none;
            pointer-events: none;
        }

        .marker-popup h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .marker-popup p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a1628 0%, #000 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-globe {
            font-size: 80px;
            animation: spin 3s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 18px;
            font-weight: 300;
        }

        .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7, #1a73e8);
            border-radius: 3px;
            animation: loading 2s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0%; margin-left: 0; }
            50% { width: 70%; margin-left: 15%; }
            100% { width: 0%; margin-left: 100%; }
        }

        @media (max-width: 768px) {
            .control-panel {
                width: 250px;
                padding: 15px;
            }
            .info-bar {
                flex-wrap: wrap;
                gap: 10px;
                font-size: 11px;
                padding: 8px 15px;
            }
        }

        .planets-grid {
            grid-template-columns: 1fr 1fr;
        }

        .planet-btn {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .planet-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .planet-btn:hover::after {
            left: 100%;
        }

        .planet-btn.active {
            background: rgba(79, 195, 247, 0.3) !important;
            border-color: #4fc3f7 !important;
            box-shadow: 0 0 15px rgba(79, 195, 247, 0.2);
        }

        .planet-info {
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.1), rgba(171, 71, 188, 0.1));
            border: 1px solid rgba(79, 195, 247, 0.3);
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
        }

        .planet-info-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .planet-info-details {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
        }

        .planet-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.98) 100%);
            z-index: 8000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .planet-transition.active {
            opacity: 1;
            pointer-events: all;
        }

        .planet-transition .travel-emoji {
            font-size: 80px;
            animation: planetApproach 2s ease-in-out;
        }

        .planet-transition .travel-text {
            color: white;
            font-size: 20px;
            margin-top: 15px;
            font-weight: 300;
        }

        .planet-transition .travel-subtext {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-top: 8px;
        }

        @keyframes planetApproach {
            0% { transform: scale(0.3) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 1; }
        }

        .earth-only {
            transition: opacity 0.3s, max-height 0.3s;
            overflow: hidden;
        }

        .earth-only.hidden-section {
            opacity: 0.3 !important;
            max-height: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            pointer-events: none !important;
            overflow: hidden !important;
        }
    </style>
</head>
<body>
    
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-globe">⚪</div>
        <div class="loading-text">Loading the globe...</div>
        <div class="loading-bar">
            <div class="loading-bar-fill"></div>
        </div>
    </div>

    <div class="planet-transition" id="planetTransition">
        <div class="travel-emoji" id="travelEmoji">🔘</div>
        <div class="travel-text" id="travelText">Travel to...</div>
        <div class="travel-subtext" id="travelSubtext">Distance: ...</div>
    </div>

    <div id="cesiumContainer"></div>
    <div id="threejsContainer"></div>

    <!-- Control Panel -->
    <div class="control-panel" id="controlPanel">
        <button class="toggle-panel" onclick="togglePanel()">☰</button>
        <h2>Earth Explorer</h2>

        <!-- Search -->
        <input type="text" class="search-box" id="searchInput" placeholder="Search a place..." onkeypress="handleSearch(event)">
        
        <!-- View modes -->
        <div class="section-title">View Mode</div>
        <div class="btn-group">
            <button class="btn btn-view active" id="btn3d" onclick="setViewMode('3d')">🌐 Globe 3D</button>
            <button class="btn btn-view" id="btn2d" onclick="setViewMode('2d')">🗺️ Map 2D</button>
            <button class="btn btn-view" id="btnColumbus" onclick="setViewMode('columbus')">📐 View Columbus</button>
        </div>

        <!-- Layer options -->
        <div class="earth-only" id="earthOnlyLayers">
            <div class="section-title">Levels</div>
            <div class="btn-group">
                <button class="btn btn-view" id="btnNight" onclick="toggleNight()">🌙 Night View</button>
                <button class="btn btn-view" id="btnAtmosphere" onclick="toggleAtmosphere()">💨 Atmosphere</button>
                <button class="btn btn-view" id="btnGrid" onclick="toggleGrid()">📏 Grid</button>
            </div>
        </div>

        <!-- Type of Map -->
        <div class="earth-only" id="earthOnlyMaps">
            <div class="section-title">Type of Map</div>
            <div class="places-grid">
                <button class="place-btn map-btn active" id="btn_satellite" onclick="setImageryLayer('satellite')">
                    <span class="emoji">🛰️</span> Satellite
                </button>
                <button class="place-btn map-btn" id="btn-satellite_labels" onclick="setImageryLayer('satellite_labels')">
                    <span class="emoji">🏷️</span> Sat + Label
                </button>
                <button class="place-btn map-btn" id="btn_osm" onclick="setImageryLayer('osm')">
                    <span class="emoji">🗺️</span> Roads
                </button>
                <button class="place-btn map-btn" id="btn_terrain" onclick="setImageryLayer('terrain')">
                    <span class="emoji">⛰️</span> Terrain
                </button>
                <button class="place-btn map-btn" id="btn_dark" onclick="setImageryLayer('dark')">
                    <span class="emoji">🌑</span> Dark
                </button>
                <button class="place-btn map-btn" id="btn_watercolor" onclick="setImageryLayer('watercolor')">
                    <span class="emoji">🎨</span> Watercolor
                </button>
            </div>
        </div>

        <!-- Planets Selection -->
        <div class="section-title">⚪ Planets</div>
        <div class="places-grid planets-grid">
            <button class="place-btn planet-btn active" id="planet-earth" onclick="switchPlanet('earth')">
                <span class="emoji">🌍</span> Earth
            </button>
            <button class="place-btn planet-btn active" id="planet-moon" onclick="switchPlanet('moon')">
                <span class="emoji">🌕</span> Moon
            </button>
            <button class="place-btn planet-btn active" id="planet-mercury" onclick="switchPlanet('mercury')">
                <span class="emoji">⚪</span> Mercury
            </button>
            <button class="place-btn planet-btn active" id="planet-venus" onclick="switchPlanet('venus')">
                <span class="emoji">🟠</span> Venus
            </button>
            <button class="place-btn planet-btn active" id="planet-mars" onclick="switchPlanet('mars')">
                <span class="emoji">🔴</span> Mars
            </button>
            <button class="place-btn planet-btn active" id="planet-jupiter" onclick="switchPlanet('jupiter')">
                <span class="emoji">🟠</span> Jupiter
            </button>
            <button class="place-btn planet-btn active" id="planet-saturn" onclick="switchPlanet('saturn')">
                <span class="emoji">🪐</span> Saturn
            </button>
            <button class="place-btn planet-btn active" id="planet-uranus" onclick="switchPlanet('uranus')">
                <span class="emoji">🔵</span> Uranus
            </button>
            <button class="place-btn planet-btn active" id="planet-neptune" onclick="switchPlanet('neptune')">
                <span class="emoji">🔵</span> Neptune
            </button>
            <button class="place-btn planet-btn active" id="planet-pluto" onclick="switchPlanet('pluto')">
                <span class="emoji">⚪</span> Pluto
            </button>
        </div>

        <!-- Planet info banner -->
        <div class="planet-info" id="planetInfo" style="display: none;">
            <div class="planet-info-name" id="planetInfoName"></div>
            <div class="planet-info-details" id="planetInfoDetails"></div>
            <button class="btn btn-fly" onclick="switchPlanet('earth')" style="margin-top: 8px; font-size: 12px;">
                🌍 Return to the Earth
            </button>
        </div>

        <!-- Famous places -->
        <div class="earth-only" id="earthOnlyPlaces">
            <div class="section-title">Famous Places</div>
            <div class="places-grid">
                <button class="place-btn" onclick="flyTo(41.8902, 12.4922, 800, 'Colosseum, Rome')">
                    <span class="emoji"></span> Colosseum
                </button>
                <button class="place-btn" onclick="flyTo(48.8584, 2.2945, 800, 'Tour Eiffel, Paris')">
                    <span class="emoji"></span> Tour Eiffel
                </button>
                <button class="place-btn" onclick="flyTo(40.6892, -74.0445, 800, 'Statue of Liberty')">
                    <span class="emoji"></span> New York
                </button>
                <button class="place-btn" onclick="flyTo(27.1751, 78.0421, 800, 'Taj Mahal, India')">
                    <span class="emoji"></span> Taj Mahal
                </button>
                <button class="place-btn" onclick="flyTo(35.6762, 139.6503, 1500, 'Tokyo, Japan')">
                    <span class="emoji"></span> Tokyo
                </button>
                <button class="place-btn" onclick="flyTo(-22.9519, -43.2105, 1000, 'Cristo Redentore')">
                    <span class="emoji"></span> Rio
                </button>
                <button class="place-btn" onclick="flyTo(29.9792, 31.1342, 800, 'Pyramid Giza')">
                    <span class="emoji"></span> Pyramid
                </button>
                <button class="place-btn" onclick="flyTo(-33.8568, 151.2153, 1000, 'Sydney Opera House')">
                    <span class="emoji"></span> Sydney
                </button>
                <button class="place-btn" onclick="flyTo(40.4319, -3.6761, 1500, 'Madrid, Spain')">
                    <span class="emoji"></span> Madrid
                </button>
                <button class="place-btn" onclick="flyTo(55.7558, 37.6173, 2000, 'Moscow, Russia')">
                    <span class="emoji"></span> Moscow
                </button>
                <button class="place-btn" onclick="flyTo(-13.1631, -72.5450, 2000, 'Machu Picchu')">
                    <span class="emoji"></span> Machu Picchu
                </button>
                <button class="place-btn" onclick="flyTo(51.5007, -0.1246, 800, 'Big Ben, London')">
                    <span class="emoji"></span> London
                </button>
            </div>
        </div>

        <!-- Actions -->
        <div class="btn-group">
            <button class="btn btn-fly" onclick="resetView()">Initial View</button>
            <button class="btn btn-fly" onclick="startAutoRotate()" style="background: linear-gradient(135deg, #6a1b9a, #ab47bc);">Auto-Rotation</button>
        </div>
    </div>

    <!-- Zoom Controls -->
     <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()" title="Zoom In">+</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" onclick="zoomOut()" title="Zoom Out">-</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" onclick="resetView()" title="Reset" style="font-size: 14px;">RESET</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" onclick="toggleFullscreen()" title="Fullscreen" style="font-size: 14px;">▨</button>
     </div>

     <!-- Info Bar -->
      <div class="info-bar" id="infoBar">
        <div class="info-item">
            <span class="label">Lat:</span>
            <span class="value" id="latValue">0.000</span>
        </div>
        <div class="info-item">
            <span class="label">Lon:</span>
            <span class="value" id="lonValue">0.000</span>
        </div>
        <div class="info-item">
            <span class="label">Alt:</span>
            <span class="value" id="altValue">0 km</span>
        </div>
        <div class="info-item">
            <span class="label">Location: </span>
            <span class="value" id="locationName">-</span>
        </div>
      </div>

      <script>
        
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIwYzgxMDM4Mi0wOGZiLTQ3MTAtOGZhNS1lZWY3OTlkY2IzM2IiLCJpZCI6NDI2Mzg1LCJpc3MiOiJodHRwczovL2lvbi5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3Nzc3MTM1MTF9.3fyU4NS_gcjcKttom8X93wKqDvO8RGX21l-lY3AyQx8';

        (function patchCesiumRangeError() {
            const originalRender = Cesium.Scene.prototype.render;
            Cesium.Scene.prototype.render = function() {
                try {
                    return originalRender.apply(this, arguments);
                } catch (e) {
                    if (e instanceof RangeError && e.message.includes('Invalid array length')) {
                        return;
                    }
                    throw e;
                }
            };
        })();

        let autoRotateEnabled = false;
        let nightMode = false;
        let gridEnabled = false;
        let gridLayer = null;
        let markers = [];
        let currentBaseLayer = 'satellite';
        let currentPlanet = 'earth';

                dayLength: '27.3 days',

            mercury: {

                yearLength: '88 days',

        function loadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';

                img.onload = () => resolve(img);
                img.onerror = (e) => reject(new Error('Image load failed: ' + url));

                const timeout = setTimeout(() => {
                    reject(new Error('Image load timeout: ' + url));
                }, 10000);

                img.onload = () => {
                    clearTimeout(timeout);
                    resolve(img);
                };

                img.src = url;
            });
        }

        function resizeImageToPowerOfTwo(img, maxWidth, maxHeight) {
            const canvas = document.createElement('canvas');
            canvas.width = maxWidth || 2048;
            canvas.height = maxHeight || 1024;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.92);
        }

        // Procedural Texture for planets

        function createProceduralTexture(planet) {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            const baseColor = Cesium.Color.fromCssColorString(planet.color);
            const r = Math.floor(baseColor.red * 255);
            const g = Math.floor(baseColor.green * 255);
            const b = Math.floor(baseColor.blue * 255);

            const bgGradient = ctx.createLinearGradient(0, 0, 0, 1024);
            bgGradient.addColorStop(0, `rgb(${Math.min(255, r + 20)}, ${Math.min(255, g + 20)}, ${Math.min(255, b + 20)})`);
            bgGradient.addColorStop(0.3, `rgb(${r}, ${g}, ${b})`);
            bgGradient.addColorStop(0.5, `rgb(${Math.max(0, r - 10)}, ${Math.max(0, g - 10)}, ${Math.max(0, b - 10)})`);
            bgGradient.addColorStop(0.7, `rgb(${r}, ${g}, ${b})`);
            bgGradient.addColorStop(1, `rgb(${Math.min(255, r + 15)}, ${Math.min(255, g + 15)}, ${Math.min(255, b + 15)})`);
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, 2048, 1024);

            const isGasGiant = ['jupiter', 'saturn', 'uranus', 'neptune'].includes(planet.name.toLowerCase()) || planet.color === '#c88b3a' || planet.color === '#e8d5a3' || planet.color === '#4fc1e9' || planet.color === '#3498db';
            const isRocky = ['mercury', 'moon', 'pluto'].includes(planet.name.toLowerCase()) || planet.color === '#8c7e6d' || planet.color === '#aaaaaa' || planet.color === '#8e735b';

            if (isGasGiant) {
                // Horizontal bands for Gas Giant
                for (let y = 0; y < 1024; y++) {
                    const bandIntensity = Math.sin(y * 0.03) * 0.15 + Math.sin(y * 0.07) * 0.08 + Math.sin(y * 0.15) * 0.05;
                    const noise = (Math.random() - 0.5) * 10;

                    const br = Math.max(0, Math.min(255, r + bandIntensity * 255 + noise));
                    const bg2 = Math.max(0, Math.min(255, g + bandIntensity * 200 + noise));
                    const bb = Math.max(0, Math.min(255, b + bandIntensity * 150 + noise));

                    ctx.fillStyle = `rgb(${br}, ${bg2}, ${bb})`;
                    ctx.fillRect(0, y, 2048, 1);
                }

                // Turbulence
                for (let i = 0; i < 200; i++) {
                    const x = Math.random() * 2048;
                    const y = Math.random() * 1024;
                    const w = Math.random() * 100 + 20;
                    const h = Math.random() * 5 + 1;
                    const alpha = Math.random() * 0.1;
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fillRect(x, y, w, h);
                }

                // Great Red Spot for Jupiter
                if (planet.name === 'Jupiter') {
                    ctx.beginPath();
                    ctx.ellipse(1400, 580, 120, 60, 0, 0, Math.PI * 2);
                    const spotGradient = ctx.createRadialGradient(1400, 580, 10, 1400, 580, 100);
                    spotGradient.addColorStop(0, 'rgba(200, 80, 50, 0.6)');
                    spotGradient.addColorStop(0.5, 'rgba(180, 60, 30, 0.4)');
                    spotGradient.addColorStop(1, 'rgba(160, 50, 20, 0.1)');
                    ctx.fillStyle = spotGradient;
                    ctx.fill();
                }

            } else if (isRocky) {
                for (let i = 0; i < 500; i++) {
                    const cx = Math.random() * 2048;
                    const cy = Math.random() * 1024;
                    const cr = Math.random() * 15 + 2;
                    const alpha = Math.random() * 0.3 + 0.05;

                    // Border of the Crater
                    ctx.beginPath();
                    ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Inside Shadow
                    ctx.beginPath();
                    ctx.arc(cx + 1, cy + 1, cr * 0.7, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 0, 0, ${alpha * 0.5})`;
                    ctx.fill();
                }

                // Variable of Terrain
                for (let i = 0; i < 15000; i++) {
                    const x = Math.random() * 2048;
                    const y = Math.random() * 1024;
                    const size = Math.random() * 3 + 0.5;
                    const bright = Math.random() > 0.5;
                    const alpha = Math.random() * 0.1;
                    ctx.fillStyle = bright ? `rgba(255, 255, 255, ${alpha})` : `rgba(0,0,0,${alpha})`;
                    ctx.fillRect(x, y, size, size);
                }

            } else {
                // Venus or other: surface with clouds/pattern
                for (let i = 0; i < 5000; i++) {
                    const x = Math.random() * 2048;
                    const y = Math.random() * 1024;
                    const w = Math.random() * 80 + 10;
                    const h = Math.random() * 20 + 5;
                    const alpha = Math.random() * 0.08;
                    ctx.fillStyle = `rgba(255, 200, 100, ${alpha})`;
                    ctx.beginPath();
                    ctx.ellipse(x, y, w, h, Math.random() * Math.PI, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            const provider = new Cesium.SingleTileImageryProvider({
                url: canvas.toDataURL('image/jpeg', 0.9),
                rectangle: Cesium.Rectangle.fromDegrees(-180, -90, 180, 90)
            });
            return provider;
        }

        // Switch Planets

        async function switchPlanet(planetId) {
            if (planetId === currentPlanet) return;
            if (window._switchingPlanet) return;
            window._switchingPlanet = true;

            const planet = PLANETS[planetId];
            if (!planet) {
                window._switchingPlanet = false;
                return;
            }

            // Show transition
            showPlanetTransition(planet);
            await sleep(2000);

            const previousPlanet = currentPlanet;
            currentPlanet = planetId;

            try {
                // Stop auto-rotate
                stopAutoRotate();

                cleanupCurrentView(previousPlanet);

                // Create new viewer
                if (planetId === 'earth') {
                    hideThreeJS();
                    showCesium();
                    await createEarthViewer();
                } else if (previousPlanet === 'moon') {
                    hideCesium();
                    await createMoonThreeJS();
                } else {
                    hideThreeJS();
                    showCesium();
                    if (previousPlanet === 'earth' || previousPlanet === 'moon') {
                        await createPlanetViewer(planetId, planet);
                    } else {
                        await switchPlanetInPlace(planetId, planet);
                    }
                }

                // Update UI
                updatePlanetUI(planetId, planet);

            } catch (error) {
                console.error('Error switching to planet:', planetId, error);
                currentPlanet = 'earth';
                try {
                    hideThreeJS();
                    showCesium();
                    cleanupCurrentView(planetId);
                    await createEarthViewer();
                    updatePlanetUI('earth', PLANETS.earth);
                } catch (e) {
                    console.error('Fallback failed:', e);
                }
            }

            // Hide transition
            hidePlanetTransition();
            window._switchingPlanet = false;
        }

        // Three.js - Moon
        
        async function createMoonThreeJS() {
            const container = document.getElementById('threejsContainer');
            container.style.display = 'block';
            container.innerHTML = '';

            threeRenderer = new THREE.WebGLRenderer({ antialias: true });
            threeRenderer.setSize(window.innerWidth, window.innerHeight);
            threeRenderer.setPixelRatio(window.devicePixelRatio);
            threeRenderer.setClearColor(0x000000);
            container.appendChild(threeRenderer.domElement);

            // Scene
            threeScene = new THREE.Scene();

            // Camera
            threeCamera = new THREE.PerspectiveCamera(
                45,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            threeCamera.position.set(0, 0, 3);

            // Orbit Controls
            threeControls = new THREE.OrbitControls(threeCamera, threeRenderer.domElement);
            threeControls.enableDamping = true;
            threeControls.dampingFactor = 0.05;
            threeControls.minDistance = 1.2;
            threeControls.maxDistance = 10;
            threeControls.rotateSpeed = 0.5;

            // Skybox
            createStarField();
            
            // Light
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
            sunLight.position.set(5, 3, 5);
            threeScene.add(sunLight);

            const ambientLight = new THREE.AmbientLight(0x333333, 0.5);
            threeScene.add(ambientLight);

            const geometry = new THREE.SphereGeometry(1, 64, 64);

            // Load texture
            let material;
            try {
                const texture = await loadThreeTexture('textures/planets/moon.jpg')
                material = new THREE.MeshPhongMaterial({
                    map: texture,
                    bumpMap: texture,
                    bumpScale: 0.02,
                });
                console.log('Moon texture loaded (Three.js)');
            } catch (e) {
                console.warn('Moon texture failed');
                material = new THREE.MeshPhongMaterial({
                    color: 0xaaaaaa,
                });
            }

            const moonMesh = new THREE.Mesh(geometry, material);
            threeScene.add(moonMesh);

            addMoonPOIsThreeJS();

            isThreeJSActive = true;

            // Loop of rendering
            function animate() {
                if (!isThreeJSActive) return;
                threeAnimationId = requestAnimationFrame(animate);

                moonMesh.rotation.y += 0.0005;

                threeControls.update();
                threeRenderer.render(threeScene, threeCamera);
            }
            animate();

            window._threeResizeHandler = function() {
                if (!isThreeJSActive) return;
                threeCamera.aspect = window.innerWidth / window.innerHeight;
                threeCamera.updateProjectionMatrix();
                threeRenderer.setSize(window.innerWidth, window.innerHeight);
            };
            window.addEventListener('resize', window._threeResizeHandler);

            setupMoonMouseTracking();
        }

                );
            });

        function createStarField() {
            const starsGeometry = new THREE.BufferGeometry();
            const starPositions = [];

            for (let i = 0; i < 5000; i++) {
                const x = (Math.random() - 0.5) * 200;
                const y = (Math.random() - 0.5) * 200;
                const z = (Math.random() - 0.5) * 200;
                starPositions.push(x, y, z);
            }

            starsGeometry.setAttribute('position',
                new THREE.Float32BufferAttribute(starPositions, 3)
            );

            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.15,
                sizeAttenuation: true
            });

            const stars = new THREE.Points(starsGeometry, starsMaterial);
            threeScene.add(stars);

        function addMoonPOIsThreeJS() {
            const pois = [
                { name: 'Sea ​​of ​​tranquility', lat: 8.5, lon: 31.4, desc: 'Apollo 11 - First Moon Landing'},
                { name: 'Crater Tycho', lat: -43.3, lon: -11.2, desc: 'Crater'},
                { name: 'Crater Copernicus', lat: 9.6, lon: -20.1, desc: 'Crater'},
                { name: 'Apollo 17', lat: 20.2, lon: 30.8, desc: 'Last Human Moon Landing'},
                { name: 'Lunar South Pole', lat: -89.5, lon: 0, desc: 'Possible water ice'},
            ];

            pois.forEach(poi => {
                const latRad = THREE.MathUtils.degToRad(poi.lat);
                const lonRad = THREE.MathUtils.degToRad(poi.lon);
                const r = 1.02;

                const x = r * Math.cos(latRad) * Math.cos(lonRad);
                const y = r * Math.sin(latRad);
                const z = -r * Math.cos(latRad) * Math.sin(lonRad);

                const dotGeometry = new THREE.SphereGeometry(0.015, 8, 8);
                const dotMaterial = new THREE.MeshBasicMaterial({ color: 0x4fc3f7 });
                const dot = new THREE.Mesh(dotGeometry, dotMaterial);
                dot.position.set(x, y, z);
                dot.userData = { name: poi.name, lat: poi.lat, lon: poi.lon };
                threeScene.add(dot);

                const label = createTextSprite(poi.name);
                label.position.set(x, y + 0.05, z);
                label.scale.set(0.3, 0.15, 1);
                threeScene.add(label);
            });
        }

        function createTextSprite(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(0, 0, 256, 64);

            ctx.font = 'bold 20px Arial';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 32);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true
            });
            
            return new THREE.Sprite(material);
        }

        function setupMoonMouseTracking() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            threeRenderer.domElement.addEventListener('mousemove', function(event) {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, threeCamera);

                const sphereCenter = new THREE.Vector3(0, 0, 0);
                const sphereRadius = 1;
                const ray = raycaster.ray;

                const oc = new THREE.Vector3().subVectors(ray.origin, sphereCenter);
                const a = ray.direction.dot(ray.direction);
                const b = 2.0 * oc.dot(ray.direction);
                const c = oc.dot(oc) - sphereRadius * sphereRadius;
                const discriminant = b * b - 4 * a * c;

                if (discriminant > 0) {
                    const t = (-b - Math.sqrt(discriminant)) / (2 * a);
                    if (t > 0) {
                        const point = new THREE.Vector3();
                        ray.at(t, point);

                        const lat = THREE.MathUtils.radToDeg(Math.asin(point.y / sphereCenter));
                        const lon = THREE.MathUtils.radToDeg(Math.atan2(-point.z, point.x));

                        document.getElementById('latValue').textContent = lat.toFixed(3) + '°';
                        document.getElementById('lonValue').textContent = lon.toFixed(3) + '°';
                    }
                }

                const dist = threeCamera.position.length();
                const altKm = ((dist - 1) * 1737.4).toFixed(0);
                document.getElementById('altValue').textContent = altKm + ' km';
            });
        }

        function destroyThreeJS() {
            isThreeJSActive = false;

            if (threeAnimationId) {
                cancelAnimationFrame(threeAnimationId);
                threeAnimationId = null;
            }

            if (window._threeResizeHandler) {
                window.removeEventListener('resize', window._threeResizeHandler);
                window._threeResizeHandler = null;
            }

            if (threeControls) {
                threeControls.dispose();
                threeControls = null;
            }

            if (threeRenderer) {
                threeRenderer.dispose();
                threeRenderer = null;
            }

            threeScene = null;
            threeCamera = null;

            const container = document.getElementById('threejsContainer');
            container.innerHTML = '';
            container.style.display = 'none';
        }

        async function switchPlanetInPlace(planetId, planet) {
            // Remove all entities
            viewer.entities.removeAll();

            let textureDataUrl = null
            if (planet.textureUrl) {
                try {
                    const img = await loadImage(planet.textureUrl);
                    const canvas = document.createElement('canvas');
                    canvas.width = 1024;
                    canvas.height = 512;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 1024, 512);
                    textureDataUrl = canvas.toDataURL('image/jpeg', 0.9);
                } catch (e) {
                    console.warn('Texture failed:', planet.name, e.message);
                }
            }

            const DISPLAY_RADIUS = 6371000;

            let sphereMaterial;
            if (textureDataUrl) {
                sphereMaterial = new Cesium.ImageMaterialProperty({
                    image: textureDataUrl,
                    transparent: false,
                    repeat: new Cesium.Cartesian2(1.0, 1.0)
                });
            } else {
                const proceduralCanvas = buildProceduralCanvas(planet);
                sphereMaterial = new Cesium.ImageMaterialProperty({
                    image: proceduralCanvas.toDataURL('image/jpeg', 0.9),
                    transparent: false
                });
            }

            viewer.entities.add({
                name: planet.name,
                position: Cesium.Cartesian3.ZERO,
                ellipsoid: {
                    radii: new Cesium.Cartesian3(DISPLAY_RADIUS, DISPLAY_RADIUS, DISPLAY_RADIUS),
                    material: sphereMaterial,
                    outline: false,
                }
            });

            const cameraDistance = DISPLAY_RADIUS * 3.5;
            viewer.camera.setView({
                destination: new Cesium.Cartesian3(0, -cameraDistance, DISPLAY_RADIUS * 0.3),
                orientation: {
                    direction: Cesium.Cartesian3.normalize(
                        new Cesium.Cartesian3(0, 1, -0.05),
                        new Cesium.Cartesian3()
                    ),
                    up: Cesium.Cartesian3.UNIT_Z
                }
            });

            addPlanetPOIsOnSphere(planetId, DISPLAY_RADIUS);
        }

        async function createPlanetViewer(planetId, planet) {

            let textureDataUrl = null;

            if (planet.textureUrl) {
                try {
                    const img = await loadImage(planet.textureUrl);
                    const canvas = document.createElement('canvas');
                    canvas.width = 1024;
                    canvas.height = 512;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 1024, 512);
                    textureDataUrl = canvas.toDataURL('image/jpeg', 0.9);
                    console.log('Texture ready: ' + planet.name);
                } catch (e) {
                    console.warn('Texture failed:  ' + planet.name, e.message);
                }
            }

            // Create Viewer
            viewer = new Cesium.Viewer('cesiumContainer', {
                animation: false,
                baseLayerPicker: false,
                fullscreenButton: false,
                vrButton: false,
                geocoder: false,
                homeButton: false,
                infoBox: true,
                sceneModePicker: false,
                selectionIndicator: false,
                timeline: false,
                navigationHelpButton: false,
                scene3DOnly: false,
                skyBox: createSkyBox(),
                skyAtmosphere: false,
            });

            const scene = viewer.scene;
            scene.globe.show = false;
            scene.fog.enabled = false;
            scene.backgroundColor = Cesium.Color.BLACK;

            if (scene.skyAtmosphere) {
                scene.skyAtmosphere.show = false;
            }

            viewer.imageryLayers.removeAll();

            const DISPLAY_RADIUS = 6371000;

            let sphereMaterial;
            if (textureDataUrl) {
                sphereMaterial = new Cesium.ImageMaterialProperty({
                    image: textureDataUrl,
                    transparent: false,
                    repeat: new Cesium.Cartesian2(1.0, 1.0)
                });
            } else {
                const proceduralCanvas = buildProceduralCanvas(planet);
                sphereMaterial = new Cesium.ImageMaterialProperty({
                    image: proceduralCanvas.toDataURL('image/jpeg', 0.9),
                    transparent: false
                });
            }

            viewer.entities.add({
                name: planet.name,
                position: Cesium.Cartesian3.ZERO,
                ellipsoid: {
                    radii: new Cesium.Cartesian3(DISPLAY_RADIUS, DISPLAY_RADIUS, DISPLAY_RADIUS),
                    material: sphereMaterial,
                    outline: false,
                }
            });

            const cameraDistance = DISPLAY_RADIUS * 3.5;

            // Camera
            viewer.camera.setView({
                destination: new Cesium.Cartesian3(0, -cameraDistance, DISPLAY_RADIUS * 0.3),
                orientation: {
                    direction: Cesium.Cartesian3.normalize(
                        new Cesium.Cartesian3(0, 1, -0.05),
                        new Cesium.Cartesian3()
                    ),
                    up: Cesium.Cartesian3.UNIT_Z
                }
            });

            viewer.scene.screenSpaceCameraController.minimumZoomDistance = DISPLAY_RADIUS * 1.05;
            viewer.scene.screenSpaceCameraController.maximumZoomDistance = DISPLAY_RADIUS * 20;

            addPlanetPOIsOnSphere(planetId, DISPLAY_RADIUS);
            setupPlanetMouseTracking(planetId, planet);
        }

        function buildProceduralCanvas(planet) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            const baseColor = Cesium.Color.fromCssColorString(planet.color);
            const r = Math.floor(baseColor.red * 255);
            const g = Math.floor(baseColor.green * 255);
            const b = Math.floor(baseColor.blue * 255);

            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, 0, 1024, 512);

            const name = planet.name.toLowerCase();
            const isGas = ['jupiter', 'saturn', 'uranus', 'neptune'].includes(name);
            const isRocky = ['mercury', 'moon', 'pluto', 'mars'].includes(name);

            if (isGas) {
                for (let y = 0; y < 512; y++) {
                    const intensity = Math.sin(y * 0.05) * 30 + Math.sin(y * 0.12) * 15;
                    const noise = (Math.random() - 0.5) * 8;
                    ctx.fillStyle = `rgb(
                        ${Math.max(0,Math.min(255, r + intensity + noise))},
                        ${Math.max(0,Math.min(255, g + intensity * 0.7 + noise))},
                        ${Math.max(0,Math.min(255, b + intensity * 0.5 + noise))}
                    )`;
                    ctx.fillRect(0, y, 1024, 1);
                }
                if (name === 'jupiter') {
                    ctx.beginPath();
                    ctx.ellipse(650, 280, 80, 40, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(180,60,30,0.5)';
                    ctx.fill();
                }
            } else if (isRocky) {
                for (let i = 0; i < 300; i++) {
                    const cx = Math.random() * 1024;
                    const cy = Math.random() * 512;
                    const cr = Math.random() * 12 + 1;
                    ctx.beginPath();
                    ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255,255,255,${Math.random() * 0.2 + 0.05})`;

                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(cx, cy, cr * 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.15})`;
                    ctx.fill();
                }
            } else {
                for (let i = 0; i < 3000; i++) {
                    ctx.beginPath();
                    ctx.ellipse(
                        Math.random() * 1024, Math.random() * 512,
                        Math.random() * 60 + 5, Math.random() * 15 + 5,
                        Math.random() * Math.PI, 0, Math.PI * 2
                    );
                    ctx.fillStyle = `rgba(255,200,100,${Math.random() * 0.06})`;
                    ctx.fill();
                }
            }

            return canvas;
        }

        function addPlanetPOIsOnSphere(planetId, radius) {
            const pois = {
                moon: [
                    { name: 'Sea ​​of ​​tranquility', lat: 8.5, lon: 31.4, desc: 'Apollo 11 - First Moon Landing'},
                    { name: 'Crater Tycho', lat: -43.3, lon: -11.2, desc: 'Crater'},
                    { name: 'Crater Copernicus', lat: 9.6, lon: -20.1, desc: 'Crater'},
                    { name: 'Apollo 17', lat: 20.2, lon: 30.8, desc: 'Last Human Moon Landing'},
                    { name: 'Lunar South Pole', lat: -89.5, lon: 0, desc: 'Possible water ice'},
                ],
                mars: [
                    { name: 'Olympus Mons', lat: 18.65, lon: -133.8, desc: 'Tallest volcano in the Solar System (21.9 Km)'},
                    { name: 'North Pole', lat: 89.5, lon: 0, desc: 'Cap Polar Ice'},
                ],
                jupiter: [
                    { name: 'Big chunky spot', lat: -22.0, lon: -10.0, desc: 'Large Storm 16.000 km'},
                ],
                saturn: [
                    { name: 'Storm of the 2011', lat: 35.0, lon: 0, desc: 'Large White Storm'},
                ]
            };

            const planetPOIs = pois[planetId];
            if (!planetPOIs) return;

            const poiRadius = radius * 1.02;

            planetPOIs.forEach(poi => {
                const latRad = Cesium.Math.toRadians(poi.lat);
                const lonRad = Cesium.Math.toRadians(poi.lon);

                const x = poiRadius * Math.cos(latRad) * Math.cos(lonRad);
                const y = poiRadius * Math.cos(latRad) * Math.sin(lonRad);
                const z = poiRadius * Math.sin(latRad);

                const position = new Cesium.Cartesian3(x, y, z);

                viewer.entities.add({
                    name: poi.name,
                    position: position,
                    point: {
                        pixelSize: 8,
                        color: Cesium.Color.fromCssColorString(PLANETS[planetId].color),
                        outlineColor: Cesium.Color.WHITE,
                        outlineWidth: 2,
                        scaleByDistance: new Cesium.NearFarScalar(1e5, 2.0, 1e8, 0.3),
                    },
                    label: {
                        text: poi.name,
                        font: '13px sans-serif',
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        outlineWidth: 2,
                        outlineColor: Cesium.Color.BLACK,
                        fillColor: Cesium.Color.WHITE,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        pixelOffset: new Cesium.Cartesian2(0, -10),
                        scaleByDistance: new Cesium.NearFarScalar(1e5, 1.0, 1e8, 0.0),
                        translucencyByDistance: new Cesium.NearFarScalar(1e6, 1.0, 5e7, 0.0),
                    },
                    description: `
                        <div style="font-family: sans-serif; padding: 10px;">
                            <h2>${poi.name}</h2>
                            <p>${poi.desc}</p>
                            <p><strong>Lat:</strong> ${poi.lat}° <strong>Lon:</strong> ${poi.lon}°</p>
                            <p><strong>Planet:</strong> ${PLANETS[planetId].emoji} ${PLANETS[planetId].name}</p>
                        </div>
                    `
                });
            });
        }

        // Planets Mouse Tracking
        function setupPlanetMouseTracking(planetId, planet) {
            if (!viewer || viewer.isDestroyed()) return;
            
            const handler = new Cesium.ScreenSpaceEventHandler(viewer.canvas);

            handler.setInputAction(function (movement) {
                const cartesian = viewer.camera.pickEllipsoid(
                    movement.endPosition,
                    viewer.scene.globe.ellipsoid
                );

                if (cartesian) {
                    const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
                    const lat = Cesium.Math.toDegrees(cartographic.latitude);
                    const lon = Cesium.Math.toDegrees(cartographic.longitude);
                    document.getElementById('latValue').textContent = lat.toFixed(3) + '°';
                    document.getElementById('lonValue').textContent = lon.toFixed(3) + '°';
                }

                const cameraHeight = viewer.camera.positionCartographic.height;
                if (cameraHeight > 1000000) {
                    document.getElementById('altValue').textContent = (cameraHeight / 1000).toFixed(0) + ' km';
                } else if (cameraHeight > 1000) {
                    document.getElementById('altValue').textContent = (cameraHeight / 1000).toFixed(1) + ' km';
                } else {
                    document.getElementById('altValue').textContent = cameraHeight.toFixed(0) + ' m';
                }
            }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);
        }

        // Update Planet UI
        function updatePlanetUI(planetId, planet) {
            document.querySelectorAll('.planet-btn').forEach(b => b.classList.remove('active'));

            const activeBtn = document.getElementById('planet-' + planetId);
            if (activeBtn) activeBtn.classList.add('active');

            const earthSections = document.querySelectorAll('.earth-only');
            const planetInfo = document.getElementById('planetInfo');

            if (planetId === 'earth') {
                earthSections.forEach(s => {
                    s.classList.remove('hidden-section');
                    s.style.opacity = '';
                    s.style.maxHeight = '';
                    s.style.pointerEvents = '';
                });

                planetInfo.style.display = 'none';
                document.getElementById('locationName').textContent = '-';
            } else {
                earthSections.forEach(s => {
                    s.classList.add('hidden-section');
                });

                planetInfo.style.display = 'block';
                document.getElementById('planetInfoName').textContent = `${planet.emoji} ${planet.name}`;
                document.getElementById('planetInfoDetails').innerHTML = `
                    📏 Diameter: ${planet.diameter}<br>
                    ⚖️ Gravity: ${planet.gravity}<br>
                    🌡️ Temperature: ${planet.temperature}<br>
                    🌙 Moons: ${planet.moons}<br>
                    ☀️ Day: ${planet.dayLength}<br>
                    📅 Year: ${planet.yearLength}<br>
                    💨 Atmosphere: ${planet.atmosphere}
                `;
                document.getElementById('locationName').textContent = planet.name;
            }
        }

        // Manage layer imagery (Satellite, Osm ..)
        
        async function setImageryLayer(type) {
            if (!viewer) return;

            const layers = viewer.imageryLayers;
            layers.removeAll();
            gridLayer = null;

            try {
                let provider;

                switch (type) {
                    case 'satellite':
                        provider = await Cesium.ArcGisMapServerImageryProvider.fromUrl(
                            'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
                        );
                        layers.addImageryProvider(provider);
                        break;

                    case 'osm':
                        provider = new Cesium.OpenStreetMapImageryProvider({
                            url: 'https://tile.openstreetmap.org/'
                        });
                        layers.addImageryProvider(provider);
                        break;

                    case 'terrain':
                        provider = new Cesium.UrlTemplateImageryProvider({
                            url: 'https://tiles.stadiamaps.com/tiles/stamen_terrain/{z}/{x}/{y}.png',
                            credit: new Cesium.Credit('Stadia Maps / Stamen Design'),
                            maximumLevel: 14
                        });
                        layers.addImageryProvider(provider)
                        break;

                    case 'dark':
                        provider = new Cesium.UrlTemplateImageryProvider({
                            url: 'https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
                            credit: new Cesium.Credit('CartoDB'),
                            maximumLevel: 18
                        });
                        layers.addImageryProvider(provider);
                        break;

                    case 'watercolor':
                        provider = new Cesium.UrlTemplateImageryProvider({
                            url: 'https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg',
                            credit: new Cesium.Credit('Stadia Maps / Stamen Design'),
                            maximumLevel: 16
                        });
                        layers.addImageryProvider(provider);
                        break;

                    case 'satellite_labels':
                        const satProvider = await Cesium.ArcGisMapServerImageryProvider.fromUrl(
                            'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
                        );
                        layers.addImageryProvider(satProvider);

                        const labelsProvider = new Cesium.UrlTemplateImageryProvider({
                            url: 'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
                            credit: new Cesium.Credit('ESRI Labels'),
                            maximumLevel: 18,
                            tileWidth: 256,
                            tileHeight: 256
                        });
                        const labelsLayer = layers.addImageryProvider(labelsProvider);
                        labelsLayer.alpha = 1.0;
                        break;
                    
                    default:
                        provider = new Cesium.OpenStreetMapImageryProvider({
                            url: 'https://tile.openstreetmap.org/'
                        });
                        layers.addImageryProvider(provider);
                        type = 'osm';
                        break;
                }

                if (gridEnabled) addGridLayer();

                currentBaseLayer = type;
                document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
                const activeBtn = document.getElementById('btn_' + type);
                if (activeBtn) activeBtn.classList.add('active');

            } catch (error) {
                console.error('Error loading layer ' + type + ':', error);
                layers.removeAll();
                layers.addImageryProvider(
                    new Cesium.OpenStreetMapImageryProvider({url: 'https://tile.openstreetmap.org/' })
                );
                if (gridEnabled) addGridLayer();
                currentBaseLayer = 'osm';
                document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
                const fb = document.getElementById('btn_osm');
                if (fb) fb.classList.add('active');
            }
        }

        // Navigation - flyTo

        function flyTo(lat, lon, height, name) {
            stopAutoRotate();
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(lon, lat, height || 1000),
                orientation: {
                    heading: Cesium.Math.toRadians(0),
                    pitch: Cesium.Math.toRadians(-45),
                    roll: 0
                },
                duration: 3
            });
            if (name) document.getElementById('locationName').textContent = name;
        }

        function resetView() {
            stopAutoRotate();
            if (currentPlanet === 'earth') {
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(12.4964, 41.9028, 15000000),
                    orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
                    duration: 2
                });
            } else if (currentPlanet === 'moon') {
                if (threeCamera) {
                    threeCamera.position.set(0, 0, 3);
                    if (threeControls) threeControls.reset();
                }
            } else {
                const DISPLAY_RADIUS = 6371000;
                const cameraDistance = DISPLAY_RADIUS * 3.5;
                viewer.camera.flyTo({
                    destination: new Cesium.Cartesian3(0, -cameraDistance, DISPLAY_RADIUS * 0.3),
                    orientation: { 
                        direction: Cesium.Cartesian3.normalize(
                            new Cesium.Cartesian3(0, 1, -0.05),
                            new Cesium.Cartesian3()
                        ),
                        up: Cesium.Cartesian3.UNIT_Z
                    },
                    duration: 2
                });
            }
            document.getElementById('locationName').textContent =
                currentPlanet === 'earth' ? '-' : PLANETS[currentPlanet].name;
        }

        // Zoom

        function zoomIn() {
            viewer.camera.zoomIn(viewer.camera.positionCartographic.height * 0.3);
        }

        function zoomOut() {
            viewer.camera.zoomOut(viewer.camera.positionCartographic.height * 0.5);
        }

        // ViewMode

        function setViewMode(mode) {
            document.getElementById('btn3d').classList.remove('active');
            document.getElementById('btn2d').classList.remove('active');
            document.getElementById('btnColumbus').classList.remove('active');

            switch (mode) {
                case '3d':
                    viewer.scene.mode = Cesium.SceneMode.SCENE3D;
                    document.getElementById('btn3d').classList.add('active');
                    break;
                case '2d':
                    viewer.scene.mode = Cesium.SceneMode.SCENE2D;
                    document.getElementById('btn2d').classList.add('active');
                    break;
                case 'columbus':
                    viewer.scene.mode = Cesium.SceneMode.COLUMBUS_VIEW;
                    document.getElementById('btnColumbus').classList.add('active');
                    break;
            }
        }

        // Toggle Features

        function toggleNight() {
            nightMode = !nightMode;
            viewer.scene.globe.enableLighting = nightMode;
            document.getElementById('btnNight').classList.toggle('active');

            if (nightMode) {
                // Simulate night view
                viewer.clock.currentTime = Cesium.JulianDate.fromDate(new Date('2024-01-15T22:00:00Z'));
                viewer.clock.shouldAnimate = false;
            } else {
                viewer.clock.currentTime = Cesium.JulianDate.now();
            }
        }

        function toggleAtmosphere() {
            const scene = viewer.scene;

            if(currentPlanet !== 'earth') {
                alert(`${PLANETS[currentPlanet].emoji} ${PLANETS[currentPlanet].name} - Atmosphere: ${PLANETS[currentPlanet].atmosphere}`);
                return;
            }

            if (scene.skyAtmosphere) {
                scene.skyAtmosphere.show = !scene.skyAtmosphere.show;
            }
            scene.globe.showGroundAtmosphere = !scene.globe.showGroundAtmosphere;
            document.getElementById('btnAtmosphere').classList.toggle('active');
        }

        function addGridLayer() {
            if (!viewer) return;
            if (gridLayer) {
                viewer.imageryLayers.remove(gridLayer);
                gridLayer = null;
            }
            const gridProvider = new Cesium.GridImageryProvider({
                cells: 4,
                color: Cesium.Color.fromCssColorString('rgba(255, 255, 255, 0.3)'),
                glowColor: Cesium.Color.fromCssColorString('rgba(79, 195, 247, 0.2)'),
                glowWidth: 2
            });
            gridLayer = viewer.imageryLayers.addImageryProvider(gridProvider);
            gridLayer.alpha = 0.6;
        }

        function toggleGrid() {
            gridEnabled = !gridEnabled;
            document.getElementById('btnGrid').classList.toggle('active');
            if (gridEnabled) {
                addGridLayer();
            } else {
                // Remove grid layer
                if (gridLayer) {
                    viewer.imageryLayers.remove(gridLayer);
                    gridLayer = null;
                }
            }
        }

        // AutoRotate

        function startAutoRotate() {
            if (autoRotateEnabled) {
                stopAutoRotate();
                return;
            }
            autoRotateEnabled = true;
            viewer.clock.onTick.addEventListener(autoRotateTick);
        }

        function autoRotateTick() {
            if (!autoRotateEnabled) return;
            viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, -0.002);
        }

        function stopAutoRotate() {
            autoRotateEnabled = false;
            try {
                viewer.clock.onTick.removeEventListener(autoRotateTick);
            } catch (e) {}
        }

        // Search

        async function handleSearch(event) {
            if (event.key !== 'Enter') return;
            if (currentPlanet !== 'earth') {
                alert('The research is available only on Earth');
                return;
            }

            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`
                );
                const data = await response.json();

                if (data && data.length > 0) {
                    const result = data[0];
                    const lat = parseFloat(result.lat);
                    const lon = parseFloat(result.lon);
                    const displayName = result.display_name.split(',')[0];

                    flyTo(lat, lon, 5000, displayName);

                    // Add marker
                    viewer.entities.add({
                        name: displayName,
                        position: Cesium.Cartesian3.fromDegrees(lon, lat),
                        point: {
                            pixelSize: 12,
                            color: Cesium.Color.RED,
                            outlineColor: Cesium.Color.WHITE,
                            outlineWidth: 2,
                            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                        },
                        label: {
                            text: '- ' + displayName,
                            font: '14px sans-serif',
                            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                            outlineWidth: 2,
                            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                            pixelOffset: new Cesium.Cartesian2(0, -20),
                            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                        },
                        description: `
                            <div style="font-family: sans-serif; padding: 10px;">
                                <h2>- ${displayName}</h2>
                                <p>${result.display_name}</p>
                                <p><strong>Coordinate:</strong> ${lat.toFixed(4)}°, ${lon.toFixed(4)}°</p>
                            </div>
                        `
                    });
                } else {
                    alert('Place not founded. Try with another name.');
                }
            } catch (error) {
                console.error('Error research: ', error);
                alert('Error in the research. Check your internet connection.');
            }
        }

        // Fallback

        function initFallbackGlobe() {
            viewer = new Cesium.Viewer('cesiumContainer', {
                animation: false,
                baseLayerPicker: false,
                fullscreenButton: false,
                vrButton: false,
                geocoder: false,
                homeButton: false,
                infoBox: true,
                sceneModePicker: false,
                selectionIndicator: true,
                timeline: false,
                navigationHelpButton: false,
            });

            // Remove the layer default and add OpenStreetMap
            viewer.imageryLayers.removeAll();
            viewer.imageryLayers.addImageryProvider(
                new Cesium.OpenStreetMapImageryProvider({ url: 'https://tile.openstreetmap.org/' })
            );

            viewer.scene.globe.enableLighting = true;
            viewer.scene.globe.showGroundAtmosphere = true;

            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(12.4964, 41.9028, 15000000),
                orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
                duration: 3
            });

            addFamousPlaceMarkers();
            setupMouseTracking();

            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 2500);
        }

        // UI Help

        function togglePanel() {
            document.getElementById('controlPanel').classList.toggle('collapsed');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initializing

        async function initGlobe() {
            try {
                await createEarthViewer();
                setTimeout(() => {
                    document.getElementById('loadingScreen').classList.add('hidden');
                }, 2500);
            } catch (error) {
                console.error('Error init', error);
                initFallbackGlobe();
            }
        }

        initGlobe();

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            switch (e.key) {
                case 'r': startAutoRotate(); break;
                case 'h': resetView(); break;
                case 'f': toggleFullscreen(); break;
                case 'g': toggleGrid(); break;
                case 'Escape': stopAutoRotate(); break;
            }
        });
      </script>
</body>
</html>
