<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanetB 3D</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }

        #cesiumContainer {
            width: 100vw;
            height: 100vh;
        }

        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 20px;
            color: white;
            z-index: 1000;
            width: 300px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .control-panel.collapsed {
            transform: translateX(-260px);
        }

        .control-panel h2 {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-panel {
            position: absolute;
            right: -40px;
            top: 10px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-box {
            width: 100%;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            outline: none;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box:focus {
            border-color: #4fc3f7;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .btn-fly {
            background: linear-gradient(135deg, #1a73e8, #4fc3f7);
        }

        .btn-fly:hover {
            background: linear-gradient(135deg, #1557b0, #3daee0);
            transform: translateY(-1px);
        }

        .btn-view {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-view:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-view.active {
            background: rgba(79, 195, 247, 0.3);
            border-color: #4fc3f7;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            margin-top: 5px;
        }

        .places-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 15px;
        }

        .place-btn {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.5);
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            text-align: left;
        }

        .place-btn:hover {
            background: rgba(79, 195, 247, 0.2);
            border-color: rgba(79, 195, 247, 0.4);
            transform: scale(1.02);
        }

        .place-btn .emoji {
            font-size: 16px;
            display: block;
            margin-bottom: 3px;
        }

        .info-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 10px 25px;
            color: white;
            z-index: 1000;
            display: flex;
            gap: 25px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-item .label {
            color: rgba(255, 255, 255, 0.5);
        }

        .info-item .value {
            color: #4fc3f7;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .cesium-viewer-bottom {
            display: none !important;
        }

        .cesium-viewer-toolbar {
            display: none !important;
        }

        .zoom-controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1000;
        }

        .zoom-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .zoom-btn:hover {
            background: rgba(79, 195, 247, 0.3);
        }

        .zoom-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 2px 5px;
        }

        .marker-popup {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 15px 20px;
            color: white;
            z-index: 2000;
            min-height: 200px;
            border: 1px solid rgba(79, 195, 247, 0.3);
            display: none;
            pointer-events: none;
        }

        .marker-popup h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .marker-popup p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a1628 0%, #000 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-globe {
            font-size: 80px;
            animation: spin 3s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 18px;
            font-weight: 300;
        }

        .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7, #1a73e8);
            border-radius: 3px;
            animation: loading 2s ease-in-out infinite;
        }

        @keyframes loading {
            0% { width: 0%; margin-left: 0; }
            50% { width: 70%; margin-left: 15%; }
            100% { width: 0%; margin-left: 100%; }
        }

        @media (max-width: 768px) {
            .control-panel {
                width: 250px;
                padding: 15px;
            }
            .info-bar {
                flex-wrap: wrap;
                gap: 10px;
                font-size: 11px;
                padding: 8px 15px;
            }
        }

        .planets-grid {
            grid-template-columns: 1fr 1fr;
        }

        .planet-btn {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .planet-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .planet-btn:hover::after {
            left: 100%;
        }

        .planet-btn.active {
            background: rgba(79, 195, 247, 0.3) !important;
            border-color: #4fc3f7 !important;
            box-shadow: 0 0 15px rgba(79, 195, 247, 0.2);
        }

        .planet-info {
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.1), rgba(171, 71, 188, 0.1));
            border: 1px solid rgba(79, 195, 247, 0.3);
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
        }

        .planet-info-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .planet-info-details {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
        }

        .planet-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.98) 100%);
            z-index: 8000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .planet-transition.active {
            opacity: 1;
            pointer-events: all;
        }

        .planet-transition .travel-emoji {
            font-size: 80px;
            animation: planetApproach 2s ease-in-out;
        }

        .planet-transition .travel-text {
            color: white;
            font-size: 20px;
            margin-top: 15px;
            font-weight: 300;
        }

        .planet-transition .travel-subtext {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-top: 8px;
        }

        @keyframes planetApproach {
            0% { transform: scale(0.3) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 1; }
        }

        .earth-only {
            transition: opacity 0.3s, max-height 0.3s;
            overflow: hidden;
        }

        .earth-only.hidden-section {
            opacity: 0.3;
            max-height: 0;
            padding: 0;
            margin: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-globe">⚪</div>
        <div class="loading-text">Loading the globe...</div>
        <div class="loading-bar">
            <div class="loading-bar-fill"></div>
        </div>
    </div>

    <div class="planet-transition" id="planetTransition">
        <div class="travel-emoji" id="travelEmoji">🔘</div>
        <div class="travel-text" id="travelText">Travel to...</div>
        <div class="travel-subtext" id="travelSubtext">Distance: ...</div>
    </div>

    <div id="cesiumContainer"></div>

    <!-- Control Panel -->
    <div class="control-panel" id="controlPanel">
        <button class="toggle-panel" onclick="togglePanel()">☰</button>
        <h2>Earth Exsplorer</h2>

        <!-- Search -->
        <input type="text" class="search-box" id="searchInput" placeholder="Search a place..." onkeypress="handleSearch(event)">
        
        <!-- View modes -->
        <div class="section-title">View Mode</div>
        <div class="btn-group">
            <button class="btn btn-view active" id="btn3d" onclick="setViewMode('3d')">🌐 Globe 3D</button>
            <button class="btn btn-view" id="btn2d" onclick="setViewMode('2d')">🗺️ Map 2D</button>
            <button class="btn btn-view" id="btnColumbus" onclick="setViewMode('columbus')">📐 View Columbus</button>
        </div>

        <!-- Layer options -->
        <div class="earth-only" id="earthOnlyLayers">
            <div class="section-title">Levels</div>
            <div class="btn-group">
                <button class="btn btn-view" id="btnNight" onclick="toggleNight()">🌙 Night View</button>
                <button class="btn btn-view" id="btnAtmosphere" onclick="toggleAtmosphere()">💨 Atmosphere</button>
                <button class="btn btn-view" id="btnGrid" onclick="toggleGrid()">📏 Grid</button>
            </div>
        </div>

        <!-- Type of Map -->
        <div class="earth-only" id="earthOnlyMaps">
            <div class="section-title">Type of Map</div>
            <div class="places-grid">
                <button class="place-btn map-btn active" id="btn_satellite" onclick="setImageryLayer('satellite')">
                    <span class="emoji">🛰️</span> Satellite
                </button>
                <button class="place-btn map-btn" id="btn-satellite_labels" onclick="setImageryLayer('satellite_labels')">
                    <span class="emoji">🏷️</span> Sat + Label
                </button>
                <button class="place-btn map-btn" id="btn_osm" onclick="setImageryLayer('osm')">
                    <span class="emoji">🗺️</span> Roads
                </button>
                <button class="place-btn map-btn" id="btn_terrain" onclick="setImageryLayer('terrain')">
                    <span class="emoji">⛰️</span> Terrain
                </button>
                <button class="place-btn map-btn" id="btn_dark" onclick="setImageryLayer('dark')">
                    <span class="emoji">🌑</span> Dark
                </button>
                <button class="place-btn map-btn" id="btn_watercolor" onclick="setImageryLayer('watercolor')">
                    <span class="emoji">🎨</span> Watercolor

            </div>
        </div>

            <button class="place-btn planet-btn active" id="planet-moon" onclick="switchPlanet('moon')">

            </button>
            <button class="place-btn planet-btn active" id="planet-mercury" onclick="switchPlanet('mercury')">
                <span class="emoji">⚪</span> Mercury
            </button>
            <button class="place-btn planet-btn active" id="planet-venus" onclick="switchPlanet('venus')">
                <span class="emoji">🟠</span> Venus
            </button>
            <button class="place-btn planet-btn active" id="planet-mars" onclick="switchPlanet('mars')">
                <span class="emoji">🔴</span> Mars
            </button>
            <button class="place-btn planet-btn active" id="planet-jupiter" onclick="switchPlanet('jupiter')">
                <span class="emoji">🟠</span> Jupiter
            </button>
            <button class="place-btn planet-btn active" id="planet-saturn" onclick="switchPlanet('saturn')">
                <span class="emoji">🪐</span> Saturn
            </button>
            <button class="place-btn planet-btn active" id="planet-uranus" onclick="switchPlanet('uranus')">
                <span class="emoji">🔵</span> Uranus
            </button>
            <button class="place-btn planet-btn active" id="planet-neptune" onclick="switchPlanet('neptune')">
                <span class="emoji">🔵</span> Neptune
            </button>
            <button class="place-btn planet-btn active" id="planet-pluto" onclick="switchPlanet('pluto')">
                <span class="emoji">⚪</span> Pluto
            </button>
        </div>

        <!-- Planet info banner -->
        <div class="planet-info" id="planetInfo" style="display: none;">
            <div class="planet-info-name" id="planetInfoName"></div>
            <div class="planet-info-details" id="planetInfoDetails"></div>
            <button class="btn btn-fly" onclick="switchPlanet('earth')" style="margin-top: 8px; font-size: 12px;">
                🌍 Return to the Earth
            </button>
        </div>

        <!-- Famous places -->
        <div class="earth-only" id="earthOnlyPlaces">
            <div class="section-title">Famous Places</div>

                    <span class="emoji"></span> Madrid
                </button>
                <button class="place-btn" onclick="flyTo(55.7558, 37.6173, 2000, 'Moscow, Russia')">
                    <span class="emoji"></span> Moscow

                <button class="place-btn" onclick="flyTo(-13.1631, -72.5450, 2000, 'Machu Picchu')">
                    <span class="emoji"></span> Machu Picchu
                </button>
                <button class="place-btn" onclick="flyTo(51.5007, -0.1246, 800, 'Big Ben, London')">
                    <span class="emoji"></span> London
                </button>
            </div>
        </div>

        <!-- Actions -->
        <div class="btn-group">
            <button class="btn btn-fly" onclick="resetView()">Initial View</button>
            <button class="btn btn-fly" onclick="startAutoRotate()" style="background: linear-gradient(135deg, #6a1b9a, #ab47bc);">Auto-Rotation</button>
        </div>
    </div>

    <!-- Zoom Controls -->
     <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()" title="Zoom In">+</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" onclick="zoomOut()" title="Zoom Out">-</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" onclick="resetView()" title="Reset" style="font-size: 14px;">RESET</button>
        <div class="zoom-divider"></div>
        <button class="zoom-btn" onclick="toggleFullscreen()" title="Fullscreen" style="font-size: 14px;">▨</button>
     </div>

     <!-- Info Bar -->
      <div class="info-bar" id="infoBar">
        <div class="info-item">
            <span class="label">Lat:</span>
            <span class="value" id="latValue">0.000</span>
        </div>
        <div class="info-item">
            <span class="label">Lon:</span>
            <span class="value" id="lonValue">0.000</span>
        </div>
        <div class="info-item">
            <span class="label">Location: </span>
            <span class="value" id="locationName">-</span>
        </div>
      </div>

        function loadImage(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';

                img.onload = () => resolve(img);
                img.onerror = (e) => reject(new Error('Image load failed: ' + url));

                const timeout = setTimeout(() => {
                    reject(new Error('Image load timeout: ' + url));
                }, 10000);

                img.onload = () => {
                    clearTimeout(timeout);
                    resolve(img);
                };

                img.src = url;
            });
        }

        // Switch Planets

        async function switchPlanet(planetId) {
            if (planetId === currentPlanet) return;

            const planet = PLANETS[planetId];
            if (!planet) return;

            // Show transition
            showPlanetTransition(planet);

            await sleep(2000);

            try {
                // Stop auto-rotate
                stopAutoRotate();

                // Destroy the current viewer
                if (viewer) {
                    viewer.destroy();
                    viewer = null;
                }

                // Create new viewer for the planet
                if (planetId === 'earth') {
                    await createEarthViewer();
                } else {
                    await createPlanetViewer(planetId, planet);
                }

                currentPlanet = planetId;

                // Update UI
                updatePlanetUI(planetId, planet);

            } catch (error) {
                console.error('Error switching to planet:', planetId, error);
                // Fallback: return to the Earth
                if (planetId !== 'earth') {
                    await createEarthViewer();
                    currentPlanet = 'earth';
                    updatePlanetUI('earth', PLANETS.earth);
                }
            }
            // Hide transition
            hidePlanetTransition();
        }

        async function createEarthViewer() {
            try {
                viewer = new Cesium.Viewer('cesiumContainer', {
                    terrainProvider: await Cesium.createWorldTerrainAsync({
                        requestWaterMask: true,
                        requestVertexNormals: true
                    }),
                    animation: false,

        // Viewer Generic Planet
        
        async function createPlanetViewer(planetId, planet) {
            viewer = new Cesium.Viewer('cesiumContainer', {
                animation: false,
                baseLayerPicker: false,
                fullscreenButton: false,
                vrButton: false,
                geocoder: false,
                homeButton: false,
                infoBox: true,
                sceneModePicker: false,
                selectionIndicator: false,
                timeline: false,
                navigationHelpButton: false,
                scene3DOnly: true,
                skyBox: createSkyBox(),
                skyAtmosphere: false,
                terrainProvider: undefined
            });

            viewer.scene.globe.showGroundAtmosphere = false;
            viewer.scene.globe.enableLighting = true;
            viewer.scene.fog.enabled = false;
            viewer.scene.backgroundColor = Cesium.Color.BLACK;

            if (viewer.scene.skyAtmosphere) {
                viewer.scene.skyAtmosphere.show = false;
            }

            viewer.imageryLayers.removeAll();

            // Load texture of the planet
            let textureLoaded = false;

            if (planet.textureUrl) {
                try {
                    const img = await loadImage(planet.textureUrl);

                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    const provider = new Cesium.SingleTileImageryProvider({
                        url: canvas.toDataURL('image/jpeg', 0.9),
                        rectangle: Cesium.Rectangle.fromDegrees(-180, -90, 180, 90)
                    });

                    viewer.imageryLayers.addImageryProvider(provider);
                    textureLoaded = true;
                    console.log(`Texture loaded for ${planet.name}`);
                } catch (e) {
                    console.warn(`Could not load texture for ${planet.name}, using procedural:`, e);
                }
            }

            if (!textureLoaded) {
                const proceduralProvider = createProceduralTexture(planet);
                viewer.imageryLayers.addImageryProvider(proceduralProvider);
                console.log(`Procedural texture for ${planet.name}`);
            }

            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(0, 0, planet.cameraHeight),
                orientation: {
                    heading: Cesium.Math.toRadians(0),
                    pitch: Cesium.Math.toRadians(-90),
                    roll: 0
                },
                duration: 2
            });

            setupPlanetMouseTracking(planetId, planet);

            addPlanetPOIs(planetId);
        }

        // Solid Color for Planets without Tiles
        function addSolidColorLayer(color, ellipsoid) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            const gradient = ctx.createRadialGradient(256, 256, 50, 256, 256, 256);
            const baseColor = Cesium.Color.fromCssColorString(color);

            const r = Math.floor(baseColor.red * 255);
            const g = Math.floor(baseColor.green * 255);
            const b = Math.floor(baseColor.blue * 255);
            
            gradient.addColorStop(0, `rgb(${Math.min(255, r + 40)}, ${Math.min(255, g + 40)}, ${Math.min(255, b + 40)})`);
            gradient.addColorStop(0.5, `rgb(${r}, ${g}, ${b})`);
            gradient.addColorStop(1, `rgb(${Math.max(0, r - 30)}, ${Math.max(0, g - 30)}, ${Math.max(0, b - 30)})`);

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);

            for (let i = 0; i < 8000; i++) {
                const x = Math.random() * 512;
                const y = Math.random() * 512;
                const size = Math.random() * 3;
                const alpha = Math.random() * 0.15;
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.fillRect(x, y, size, size);
            }

            if (color === '#c88b3a' || color === '#e8d5a3' || color === '#4fc1e9' || color === '#3498db') {
                for (let y = 0; y < 512; y += 8) {
                    const bandAlpha = Math.sin(y * 0.05) * 0.1 + 0.05;
                    ctx.fillStyle = `rgba(255,255,255,${Math.abs(bandAlpha)})`;
                    ctx.fillRect(0, y, 512, 4);
                }
            }

            const provider = new Cesium.SingleTileImageryProvider({
                url: canvas.toDataURL(),
                ellipsoid: ellipsoid
            });

            viewer.imageryLayers.addImageryProvider(provider);
        }

        // Planets Mouse Tracking
        function setupPlanetMouseTracking(planetId, planet) {
            const handler = new Cesium.ScreenSpaceEventHandler(viewer.canvas);

            handler.setInputAction(function (movement) {
                const cartesian = viewer.camera.pickEllipsoid(
                    movement.endPosition,
                    viewer.scene.globe.ellipsoid
                );

                if (cartesian) {
                    const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
                    const lat = Cesium.Math.toDegrees(cartographic.latitude);
                    const lon = Cesium.Math.toDegrees(cartographic.longitude);
                    document.getElementById('latValue').textContent = lat.toFixed(3) + '°';
                    document.getElementById('lonValue').textContent = lon.toFixed(3) + '°';
                }

                const cameraHeight = viewer.camera.positionCartographic.height;
                if (cameraHeight > 1000000) {
                    document.getElementById('altValue').textContent = (cameraHeight / 1000).toFixed(0) + ' km';
                } else if (cameraHeight > 1000) {
                    document.getElementById('altValue').textContent = (cameraHeight / 1000).toFixed(1) + ' km';
                } else {
                    document.getElementById('altValue').textContent = cameraHeight.toFixed(0) + ' m';
                }
            }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);
        }

            document.querySelectorAll('.planet-btn').forEach(b => b.classList.remove('active'));

            if (activeBtn) activeBtn.classList.add('active');

            const earthSections = document.querySelectorAll('.earth-only');

            if (planetId === 'earth') {
                earthSections.forEach(s => s.classList.remove('hidden-section'));

        // Manage layer imagery (Satellite, Osm ..)
        
        async function setImageryLayer(type) {
            if (!viewer) return;
            if (currentPlanet !== 'earth') return;

            const layers = viewer.imageryLayers;
            layers.removeAll();
            gridLayer = null;

            try {
                let provider;

                switch (type) {
                    case 'satellite':
                        provider = await Cesium.ArcGisMapServerImageryProvider.fromUrl(
                            'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
                        );
                        layers.addImageryProvider(provider);
                        break;

                    case 'osm':
                        provider = new Cesium.OpenStreetMapImageryProvider({
                            url: 'https://tile.openstreetmap.org/'
                        });
                        layers.addImageryProvider(provider);
                        break;

                    case 'terrain':
                        provider = new Cesium.UrlTemplateImageryProvider({
                            url: 'https://tiles.stadiamaps.com/tiles/stamen_terrain/{z}/{x}/{y}.png',
                            credit: new Cesium.Credit('Stadia Maps / Stamen Design'),
                            maximumLevel: 14
                        });
                        layers.addImageryProvider(provider)
                        break;

                    case 'dark':
                        provider = new Cesium.UrlTemplateImageryProvider({
                            url: 'https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
                            credit: new Cesium.Credit('CartoDB'),
                            maximumLevel: 18
                        });
                        layers.addImageryProvider(provider);
                        break;

                    case 'watercolor':
                        provider = new Cesium.UrlTemplateImageryProvider({
                            url: 'https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg',
                            credit: new Cesium.Credit('Stadia Maps / Stamen Design'),
                            maximumLevel: 16
                        });
                        layers.addImageryProvider(provider);
                        break;

                    case 'satellite_labels':
                        const satProvider = await Cesium.ArcGisMapServerImageryProvider.fromUrl(
                            'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
                        );
                        layers.addImageryProvider(satProvider);

                        const labelsProvider = new Cesium.UrlTemplateImageryProvider({
                            url: 'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
                            credit: new Cesium.Credit('ESRI Labels'),
                            maximumLevel: 18,
                            tileWidth: 256,
                            tileHeight: 256
                        });
                        const labelsLayer = layers.addImageryProvider(labelsProvider);
                        labelsLayer.alpha = 1.0;
                        break;
                    
                    default:
                        provider = new Cesium.OpenStreetMapImageryProvider({
                            url: 'https://tile.openstreetmap.org/'
                        });
                        layers.addImageryProvider(provider);
                        type = 'osm';
                        break;
                }

                if (gridEnabled) addGridLayer();

                currentBaseLayer = type;
                document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
                const activeBtn = document.getElementById('btn_' + type);
                if (activeBtn) activeBtn.classList.add('active');

            } catch (error) {
                console.error('Error loading layer ' + type + ':', error);
                layers.removeAll();
                layers.addImageryProvider(
                    new Cesium.OpenStreetMapImageryProvider({url: 'https://tile.openstreetmap.org/' })
                );
                if (gridEnabled) addGridLayer();
                currentBaseLayer = 'osm';
                document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
                const fb = document.getElementById('btn_osm');
                if (fb) fb.classList.add('active');
            }
        }

                            <h2>${place.emoji} ${place.name}</h2>
                            <p><strong>Coordinate:</strong> ${place.lat.toFixed(4)}°, ${place.lon.toFixed(4)}°</p>
                        </div>
                    `
                });
            });
        }

        // Mouse Tracking

        function setupMouseTracking() {
            const handler = new Cesium.ScreenSpaceEventHandler(viewer.canvas);

            handler.setInputAction(function (movement) {
                const cartesian = viewer.camera.pickEllipsoid(
                    movement.endPosition,
                    viewer.scene.globe.ellipsoid
                );

                if (cartesian) {
                    const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
                    const lat = Cesium.Math.toDegrees(cartographic.latitude);
                    const lon = Cesium.Math.toDegrees(cartographic.longitude);

                    document.getElementById('latValue').textContent = lat.toFixed(3) + '°';
                    document.getElementById('lonValue').textContent = lon.toFixed(3) + '°';
                }

                const cameraHeight = viewer.camera.positionCartographic.height;
                if(cameraHeight > 1000000) {
                    document.getElementById('altValue').textContent = (cameraHeight / 1000).toFixed(0) + ' km';
                } else if (cameraHeight > 1000) {
                    document.getElementById('altValue').textContent = (cameraHeight / 1000).toFixed(1) + ' km';
                } else {
                    document.getElementById('altValue').textContent = cameraHeight.toFixed(0) + ' m';
                }
            }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);
        }

        // Navigation - flyTo

        function flyTo(lat, lon, height, name) {
            stopAutoRotate();
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(lon, lat, height || 1000),
                orientation: {
                    heading: Cesium.Math.toRadians(0),
                    pitch: Cesium.Math.toRadians(-45),
                    roll: 0
                },
                duration: 3
            });
            if (name) document.getElementById('locationName').textContent = name;
        }

        function resetView() {
            stopAutoRotate();
            if (currentPlanet == 'earth') {
                viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(12.4964, 41.9028, 15000000),
                orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
                duration: 2
                });
            } else {
                const planet = PLANETS[currentPlanet];
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromElements(planet.cameraHeight * 1.5, 0, 0),
                    orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
                    duration: 2
                });
            }
            document.getElementById('locationName').textContent = currentPlanet === 'earth' ? '-':
        PLANETS[currentPlanet].name;
        }

        // Zoom

        function zoomIn() {
            viewer.camera.zoomIn(viewer.camera.positionCartographic.height * 0.3);
        }

        function zoomOut() {
            viewer.camera.zoomOut(viewer.camera.positionCartographic.height * 0.5);
        }

        // ViewMode

        function setViewMode(mode) {
            document.getElementById('btn3d').classList.remove('active');
            document.getElementById('btn2d').classList.remove('active');
            document.getElementById('btnColumbus').classList.remove('active');

            switch (mode) {
                case '3d':
                    viewer.scene.mode = Cesium.SceneMode.SCENE3D;
                    document.getElementById('btn3d').classList.add('active');
                    break;
                case '2d':
                    viewer.scene.mode = Cesium.SceneMode.SCENE2D;
                    document.getElementById('btn2d').classList.add('active');
                    break;
                case 'columbus':
                    viewer.scene.mode = Cesium.SceneMode.COLUMBUS_VIEW;
                    document.getElementById('btnColumbus').classList.add('active');
                    break;
            }
        }

        // Toggle Features

        function toggleNight() {
            nightMode = !nightMode;
            viewer.scene.globe.enableLighting = nightMode;
            document.getElementById('btnNight').classList.toggle('active');

            if (nightMode) {
                // Simulate night view
                viewer.clock.currentTime = Cesium.JulianDate.fromDate(new Date('2024-01-15T22:00:00Z'));
                viewer.clock.shouldAnimate = false;
            } else {
                viewer.clock.currentTime = Cesium.JulianDate.now();
            }
        }

        function toggleAtmosphere() {
            const scene = viewer.scene;
            if (scene.skyAtmosphere) {
                scene.skyAtmosphere.show = !show.skyAtmosphere.show;
            }
            scene.globe.showGroundAtmosphere = !scene.globe.showGroundAtmosphere;
            document.getElementById('btnAtmosphere').classList.toggle('active');
        }

        function addGridLayer() {
            if (!viewer) return;
            if (gridLayer) {
                viewer.imageryLayers.remove(gridLayer);
                gridLayer = null;
            }
            const gridProvider = new Cesium.GridImageryProvider({
                cells: 4,
                color: Cesium.Color.fromCssColorString('rgba(255, 255, 255, 0.3)'),
                glowColor: Cesium.Color.fromCssColorString('rgba(79, 195, 247, 0.2)'),
                glowWidth: 2
            });
            gridLayer = viewer.imageryLayers.addImageryProvider(gridProvider);
            gridLayer.alpha = 0.6;
        }

        function toggleGrid() {
            gridEnabled = !gridEnabled;
            document.getElementById('btnGrid').classList.toggle('active');
            if (gridEnabled) {
                addGridLayer();
            } else {
                // Remove grid layer
                if (gridLayer) {
                    viewer.imageryLayers.remove(gridLayer);
                    gridLayer = null;
                }
            }
        }

        // AutoRotate

        function startAutoRotate() {
            if (autoRotateEnabled) {
                stopAutoRotate();
                return;
            }
            autoRotateEnabled = true;
            viewer.clock.onTick.addEventListener(autoRotateTick);
        }

        function autoRotateTick() {
            if (!autoRotateEnabled) return;
            viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, -0.002);
        }

        function stopAutoRotate() {
            autoRotateEnabled = false;
            try {
                viewer.clock.onTick.removeEventListener(autoRotateTick);
            } catch (e) {}
        }

        // Search

        async function handleSearch(event) {
            if (event.key !== 'Enter') return;
            if (currentPlanet !== 'earth') {
                alert('The research is available only on Earth');
                return;
            }

            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`
                );
                const data = await response.json();

                if (data && data.length > 0) {
                    const result = data[0];
                    const lat = parseFloat(result.lat);
                    const lon = parseFloat(result.lon);
                    const displayName = result.display_name.split(',')[0];

                    flyTo(lat, lon, 5000, displayName);

                    // Add marker
                    viewer.entities.add({
                        name: displayName,
                        position: Cesium.Cartesian3.fromDegrees(lon, lat),
                        point: {
                            pixelSize: 12,
                            color: Cesium.Color.RED,
                            outlineColor: Cesium.Color.WHITE,
                            outlineWidth: 2,
                            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                        },
                        label: {
                            text: '- ' + displayName,
                            font: '14px sans-serif',
                            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                            outlineWidth: 2,
                            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                            pixelOffset: new Cesium.Cartesian2(0, -20),
                            heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                        },
                        description: `
                            <div style="font-family: sans-serif; padding: 10px;">
                                <h2>- ${displayName}</h2>
                                <p>${result.display_name}</p>
                                <p><strong>Coordinate:</strong> ${lat.toFixed(4)}°, ${lon.toFixed(4)}°</p>
                            </div>
                        `
                    });
                } else {
                    alert('Place not founded. Try with another name.');
                }
            } catch (error) {
                console.error('Error research: ', error);
                alert('Error in the research. Check your internet connection.');
            }
        }

        // Fallback

        function initFallbackGlobe() {
            viewer = new Cesium.Viewer('cesiumContainer', {
                animation: false,
                baseLayerPicker: false,
                fullscreenButton: false,
                vrButton: false,
                geocoder: false,
                homeButton: false,
                infoBox: true,
                sceneModePicker: false,
                selectionIndicator: true,
                timeline: false,
                navigationHelpButton: false,
            });

            // Remove the layer default and add OpenStreetMap
            viewer.imageryLayers.removeAll();
            viewer.imageryLayers.addImageryProvider(
                new Cesium.OpenStreetMapImageryProvider({ url: 'https://tile.openstreetmap.org/' })
            );

            viewer.scene.globe.enableLighting = true;
            viewer.scene.globe.showGroundAtmosphere = true;

            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(12.4964, 41.9028, 15000000),
                orientation: { heading: 0, pitch: Cesium.Math.toRadians(-90), roll: 0 },
                duration: 3
            });

            addFamousPlaceMarkers();
            setupMouseTracking();

            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 2500);
        }

        // UI Help

        function togglePanel() {
            document.getElementById('controlPanel').classList.toggle('collapsed');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initializing

        async function initGlobe() {
            try {
                await createEarthViewer();
                setTimeout(() => {
                    document.getElementById('loadingScreen').classList.add('hidden');
                }, 2500);
            } catch (error) {
                console.error('Error init', error);
                initFallbackGlobe();
            }
        }

        initGlobe();

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            switch (e.key) {
                case 'r': startAutoRotate(); break;
                case 'h': resetView(); break;
                case 'f': toggleFullscreen(); break;
                case 'g': toggleGrid(); break;
                case 'Escape': stopAutoRotate(); break;
            }
        });
      </script>
</body>
</html>
